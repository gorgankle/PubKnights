<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pub Knights - Matrix Developer Tool</title>
    <style>
        body { 
            background-color: #2c2520; 
            color: #f4ebd9; 
            font-family: 'Courier New', monospace; 
            text-align: center; 
            padding: 40px; 
            margin: 0;
        }
        h1 { color: #ffcc66; text-shadow: 0 2px 4px rgba(0,0,0,0.5); margin-bottom: 20px;}
        
        .panel { 
            background: rgba(62, 49, 38, 0.90); 
            border: 2px solid #634e3d; 
            border-radius: 5px; 
            padding: 20px; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
            margin-bottom: 20px;
        }

        /* Blows up the canvas for pixel-perfect inspection */
        #tester-canvas {
            width: 256px;
            height: 256px;
            background-color: #1a1512;
            border: 4px solid #8b5a2b;
            border-radius: 4px;
            image-rendering: pixelated; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.9);
        }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px;}
        
        button { 
            background: #8b5a2b; 
            color: white; 
            border: 1px solid #ffcc66; 
            padding: 10px; 
            font-family: monospace; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 3px; 
            font-size: 12px; 
            transition: 0.1s;
        }
        button:hover { background: #a06d3b; }
        button:active { transform: scale(0.95); }

        /* Dropdowns for Equipment */
        select.equip-drop {
            background: #1a1512; color: #ffcc66; border: 1px solid #634e3d;
            padding: 8px; font-family: monospace; border-radius: 3px;
            font-size: 11px; cursor: pointer; width: 100%;
        }
        select.equip-drop:focus { outline: none; border-color: #f1c40f; }
        
        /* New Open Listboxes for standalone assets */
        select.asset-listbox {
            background: #1a1512; color: #f4ebd9; border: 1px solid #634e3d;
            padding: 5px; font-family: monospace; border-radius: 3px;
            font-size: 12px; width: 100%; height: 250px; overflow-y: auto;
        }
        select.asset-listbox option { padding: 6px; border-bottom: 1px solid #2c2520; cursor: pointer; }
        select.asset-listbox option:checked { background: #8b5a2b; color: #ffffff; font-weight: bold; }
        select.asset-listbox:focus { outline: none; border-color: #f1c40f; }

        .section-title { color: #bbaaa0; font-size: 14px; text-transform: uppercase; margin: 0 0 15px 0; border-bottom: 1px dashed #634e3d; padding-bottom: 5px; text-align: left; }
    </style>
</head>
<body>

    <h1>🛠️ Procedural Matrix Inspector</h1>

    <div style="text-align: center; margin-bottom: 20px;">
        <div id="char-creation-screen" style="display:none;"></div>
        <canvas id="menuCharacterCanvas" style="display:none;"></canvas>
        <canvas id="tester-canvas" width="24" height="24"></canvas>
    </div>

    <div class="panel" style="max-width: 900px; margin: 0 auto 20px auto;">
        <div class="section-title" style="color: #f1c40f;">🧍 Box 1: Character & Equipment</div>
        
        <div class="grid">
            <button onclick="testerCycle('gender')">Gender</button>
            <button onclick="testerCycle('skin')">Skin Tone</button>
            <button onclick="testerCycle('hair')">Hair Style</button>
            <button onclick="testerCycle('hairColor')">Hair Color</button>
            <button onclick="testerCycle('eyes')">Eye Color</button>
            <button onclick="testerCycle('shirtColor')">Shirt Color</button>
            <button onclick="testerCycle('pantsColor')">Pants Color</button>
            <button onclick="testerCycle('bootsColor')">Base Boots Color</button>
        </div>

        <div class="grid" style="grid-template-columns: repeat(5, 1fr); margin-bottom: 0;">
            <select class="equip-drop" id="select-helmet" onchange="testerEquip('helmet', this.value)">
                <option value="none">-- No Helmet --</option>
            </select>
            <select class="equip-drop" id="select-armor" onchange="testerEquip('armor', this.value)">
                <option value="none">-- No Armor --</option>
            </select>
            <select class="equip-drop" id="select-weapon" onchange="testerEquip('weapon', this.value)">
                <option value="none">-- No Weapon --</option>
            </select>
            <select class="equip-drop" id="select-gloves" onchange="testerEquip('gloves', this.value)">
                <option value="none">-- No Gloves --</option>
            </select>
            <select class="equip-drop" id="select-boots" onchange="testerEquip('boots', this.value)">
                <option value="none">-- No Boots --</option>
            </select>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; max-width: 900px; margin: 0 auto;">
        
        <div class="panel" style="margin: 0; padding: 15px;">
            <div class="section-title" style="color: #2ecc71;">🗺️ Box 2: Map Tiles</div>
            <select id="map-selector" class="asset-listbox" size="10" onchange="previewStandalone('map-selector')"></select>
        </div>

        <div class="panel" style="margin: 0; padding: 15px;">
            <div class="section-title" style="color: #e74c3c;">👾 Box 3: NPCs</div>
            <select id="npc-selector" class="asset-listbox" size="10" onchange="previewStandalone('npc-selector')"></select>
        </div>

        <div class="panel" style="margin: 0; padding: 15px;">
            <div class="section-title" style="color: #3498db;">🎒 Box 4: UI Icons</div>
            <select id="icon-selector" class="asset-listbox" size="10" onchange="previewStandalone('icon-selector')"></select>
        </div>

    </div>

    <script>
        // Mock Player Object
        var player = {
            appearance: {
                gender: 'male', skin: 'light', hair: 'hair_messy',
                hairColor: 'brown', eyes: 'eyes_blue', shirtColor: 'blue',
                pantsColor: 'dark', bootsColor: 'leather'
            },
            equipment: { helmet: null, armor: null, weapon: null, gloves: null, boots: null }
        };
    </script>

    <script src="js/character-creator.js"></script>
    <script src="js/items.js"></script>
    <script src="js/item-assets.js"></script>
    <script src="js/icon-assets.js"></script>
    <script src="js/npc-assets.js"></script>
    <script src="js/map-assets.js"></script>

   <script>
        // === 1. POPULATE BOX 1 (EQUIPMENT) ===
        function initializeInventoryUI() {
            const gearSlots = ['helmet', 'armor', 'weapon', 'gloves', 'boots'];
            const availableGear = { helmet: [], armor: [], weapon: [], gloves: [], boots: [] };

            for (let key in ItemDatabase) {
                let item = ItemDatabase[key];
                if (availableGear[item.slot]) availableGear[item.slot].push(item);
            }

            gearSlots.forEach(slot => {
                let select = document.getElementById(`select-${slot}`);
                availableGear[slot].forEach(item => {
                    let opt = document.createElement('option');
                    opt.value = item.id; opt.innerText = item.name;
                    select.appendChild(opt);
                });
            });
        }

        // === 2. AUTO-SORT & POPULATE BOXES 2, 3, 4 ===
        function initializeAssetBoxes() {
            let mapSel = document.getElementById("map-selector");
            let npcSel = document.getElementById("npc-selector");
            let iconSel = document.getElementById("icon-selector");

            setTimeout(() => {
                if (typeof SpriteMatrices !== 'undefined') {
                    
                    let equipmentSprites = new Set();
                    if (typeof ItemDatabase !== 'undefined') {
                        for (let key in ItemDatabase) {
                            let sId = ItemDatabase[key].spriteId;
                            if (sId) {
                                equipmentSprites.add(sId);
                                equipmentSprites.add(sId + '_male'); 
                                equipmentSprites.add(sId + '_female');
                            }
                        }
                    }

                    Object.keys(SpriteMatrices).sort().forEach(key => {
                        let opt = document.createElement("option");
                        opt.value = key; opt.text = key;

                        if (key.startsWith('icon_')) {
                            iconSel.appendChild(opt);
                        } else if (key.match(/^(map_|ground_|wall_|obj_)/)) {
                            mapSel.appendChild(opt);
                        } else if (key.match(/^(body_|hair_|eyes_)/) || equipmentSprites.has(key)) {
                            return; 
                        } else {
                            npcSel.appendChild(opt);
                        }
                    });
                }
            }, 100);
        }

        // === 3. STANDALONE RENDER CONTROLLER ===
        function resetStandaloneSelectors() {
            document.getElementById("map-selector").selectedIndex = -1;
            document.getElementById("npc-selector").selectedIndex = -1;
            document.getElementById("icon-selector").selectedIndex = -1;
        }

        function previewStandalone(activeSelectorId) {
            const selectors = ['map-selector', 'npc-selector', 'icon-selector'];
            selectors.forEach(id => {
                if (id !== activeSelectorId) document.getElementById(id).selectedIndex = -1;
            });

            let selected = document.getElementById(activeSelectorId).value;
            const canvas = document.getElementById('tester-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let originalB = PALETTE['b'];
            if (activeSelectorId === 'npc-selector') {
                PALETTE['b'] = '#5d4037'; // Boar Brown
            } else {
                PALETTE['b'] = '#f4ebd9'; // Bone White
            }

            if (selected && SpriteMatrices[selected]) {
                drawProceduralSprite(ctx, SpriteMatrices[selected], 0, 0, 24);
            } else {
                renderPreview(); 
            }

            PALETTE['b'] = originalB;
        }

        // === 4. PAPERDOLL EVENT TRIGGERS ===
        function testerEquip(slot, itemId) {
            resetStandaloneSelectors(); 
            if (itemId === "none") player.equipment[slot] = null;
            else player.equipment[slot] = ItemDatabase[itemId];
            renderPreview();
        }

        function testerCycle(part) {
            resetStandaloneSelectors(); 
            let currentIdx = appearanceOptions[part].indexOf(player.appearance[part]);
            let nextIdx = (currentIdx + 1) % appearanceOptions[part].length;
            player.appearance[part] = appearanceOptions[part][nextIdx];
            renderPreview();
        }

        // === 5. UPGRADED PAPERDOLL RENDERER (WITH MASK BUFFER) ===
        function renderPreview() {
            const canvas = document.getElementById('tester-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let originalB = PALETTE['b'];
            PALETTE['b'] = '#f4ebd9';

            // === NEW: OFFSCREEN COMPOSITE BUFFER ===
            // This safely catches the clearRect masking logic without punching through the HTML background
            const bufferCanvas = document.createElement('canvas');
            bufferCanvas.width = canvas.width;
            bufferCanvas.height = canvas.height;
            const bufferCtx = bufferCanvas.getContext('2d', { alpha: true });

            let bodySprite = player.appearance.gender === 'female' ? 'body_female' : 'body_male';
            if (SpriteMatrices[bodySprite]) drawProceduralSprite(bufferCtx, SpriteMatrices[bodySprite], 0, 0, 24);
            if (SpriteMatrices[player.appearance.eyes]) drawProceduralSprite(bufferCtx, SpriteMatrices[player.appearance.eyes], 0, 0, 24);
            
            const hidesHair = player.equipment.helmet && player.equipment.helmet.hidesHair;
            if (!hidesHair && SpriteMatrices[player.appearance.hair]) {
                drawProceduralSprite(bufferCtx, SpriteMatrices[player.appearance.hair], 0, 0, 24);
            }

            const eq = player.equipment;
            let gSuffix = player.appearance.gender === 'female' ? '_female' : '_male';
            
            if (eq.armor && eq.armor.spriteId) {
                let sId = eq.armor.spriteId + gSuffix;
                if (SpriteMatrices[sId]) drawProceduralSprite(bufferCtx, SpriteMatrices[sId], 0, 0, 24);
                else if (SpriteMatrices[eq.armor.spriteId]) drawProceduralSprite(bufferCtx, SpriteMatrices[eq.armor.spriteId], 0, 0, 24);
            }
            
            if (eq.boots && eq.boots.spriteId) drawProceduralSprite(bufferCtx, SpriteMatrices[eq.boots.spriteId], 0, 0, 24);
            if (eq.gloves && eq.gloves.spriteId) drawProceduralSprite(bufferCtx, SpriteMatrices[eq.gloves.spriteId], 0, 0, 24);
            
            // The helmet is drawn last onto the buffer, applying any `_` masking pixels to the hair layer beneath it
            if (eq.helmet && eq.helmet.spriteId) drawProceduralSprite(bufferCtx, SpriteMatrices[eq.helmet.spriteId], 0, 0, 24);
            
            // STAMP THE FULLY COMPOSITED CHARACTER ONTO THE MAIN CANVAS
            ctx.drawImage(bufferCanvas, 0, 0);

            // The weapon is drawn onto the main canvas AFTER the buffer so it retains its own independent scaling and rotation
            if (eq.weapon && eq.weapon.spriteId) {
                ctx.save();
                let wPivotX = 24 * 0.58;
                let wPivotY = 24 * 0.5; 
                ctx.translate(wPivotX, wPivotY);
                let scaleMult = eq.weapon.oversizeScale || 1.0;
                ctx.scale(scaleMult, scaleMult);
                ctx.translate(-wPivotX, -wPivotY);
                drawProceduralSprite(ctx, SpriteMatrices[eq.weapon.spriteId], 0, 0, 24);
                ctx.restore();
            }

            PALETTE['b'] = originalB;
        }

        // === 6. BOOT INITIALIZATION ===
        window.addEventListener('load', () => {
            initializeInventoryUI();
            initializeAssetBoxes();
            renderPreview();
        });
    </script>
</body>
</html>

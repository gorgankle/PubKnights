<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pub Knights - Matrix Developer Tool</title>
    <style>
        body { 
            background-color: #2c2520; 
            color: #f4ebd9; 
            font-family: 'Courier New', monospace; 
            text-align: center; 
            padding: 40px; 
        }
        h1 { color: #ffcc66; text-shadow: 0 2px 4px rgba(0,0,0,0.5); margin-bottom: 20px;}
        
        .panel { 
            background: rgba(62, 49, 38, 0.90); 
            border: 2px solid #634e3d; 
            border-radius: 5px; 
            padding: 20px; 
            display: inline-block; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
        }

        /* Blows up the 32x32 canvas for pixel-perfect inspection */
        #tester-canvas {
            width: 256px;
            height: 256px;
            background-color: #1a1512;
            border: 4px solid #8b5a2b;
            border-radius: 4px;
            image-rendering: pixelated; 
            margin-bottom: 20px;
        }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        
        button { 
            background: #8b5a2b; 
            color: white; 
            border: 1px solid #ffcc66; 
            padding: 10px; 
            font-family: monospace; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 3px; 
            font-size: 12px; 
            transition: 0.1s;
        }
        button:hover { background: #a06d3b; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h1>🛠️ Procedural Matrix Inspector</h1>

    <div class="panel">
        <div id="char-creation-screen" style="display:none;"></div>
        <canvas id="menuCharacterCanvas" style="display:none;"></canvas>

        <canvas id="tester-canvas" width="32" height="32"></canvas>

        <div class="grid">
            <button onclick="testerCycle('gender')">Gender</button>
            <button onclick="testerCycle('skin')">Skin Tone</button>
            <button onclick="testerCycle('hair')">Hair Style</button>
            <button onclick="testerCycle('hairColor')">Hair Color</button>
            <button onclick="testerCycle('eyes')">Eye Color</button>
            <button onclick="testerCycle('shirtColor')">Shirt Color</button>
            <button onclick="testerCycle('pantsColor')">Pants Color</button>
            <button onclick="testerCycle('bootsColor')">Boots Color</button>
        </div>
    </div>

    <script>
        var player = {
            appearance: {
                gender: 'male', skin: 'light', hair: 'hair_messy',
                hairColor: 'brown', eyes: 'eyes_blue', shirtColor: 'blue',
                pantsColor: 'dark', bootsColor: 'leather'
            },
            equipment: { helmet: null, armor: null, weapon: null, gloves: null, boots: null }
        };
    </script>

    <script src="js/character-creator.js"></script>

    <script>
        function renderPreview() {
            const canvas = document.getElementById('tester-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let bodySprite = player.appearance.gender === 'female' ? 'body_female' : 'body_male';

            // Stack the matrices just like the main game loop
            if (SpriteMatrices[bodySprite]) drawProceduralSprite(ctx, SpriteMatrices[bodySprite], 0, 0, 32);
            if (SpriteMatrices[player.appearance.eyes]) drawProceduralSprite(ctx, SpriteMatrices[player.appearance.eyes], 0, 0, 32);
            if (SpriteMatrices[player.appearance.hair]) drawProceduralSprite(ctx, SpriteMatrices[player.appearance.hair], 0, 0, 32);
        }

        function testerCycle(part) {
            let currentIdx = appearanceOptions[part].indexOf(player.appearance[part]);
            let nextIdx = (currentIdx + 1) % appearanceOptions[part].length;
            player.appearance[part] = appearanceOptions[part][nextIdx];
            renderPreview();
        }

        // Hook into window load to draw the first frame
        window.addEventListener('load', renderPreview);
    </script>
</body>
</html>

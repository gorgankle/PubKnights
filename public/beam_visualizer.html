<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Particle Forge - Beam Interpolation</title>
    <style>
        body { 
            background: #2c2520; 
            color: #f4ebd9; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            gap: 20px; 
            padding: 20px; 
            justify-content: center;
        }
        .canvas-container { 
            background: #1a1512; 
            border: 2px solid #634e3d; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .panel { 
            background: #221a14; 
            padding: 20px; 
            border: 1px solid #4a3b2c; 
            border-radius: 8px; 
            width: 320px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        h2, h3 { color: #f1c40f; margin-top: 0; }
        label { display: block; margin-top: 15px; color: #ffcc66; font-size: 12px; font-weight: bold;}
        select, input[type="range"] { 
            width: 100%; 
            margin-top: 5px; 
            background: #110d0a; 
            color: #fff; 
            border: 1px solid #634e3d; 
            padding: 5px; 
            cursor: pointer;
        }
        .slider-val { float: right; color: #3498db; }
        button { 
            margin-top: 25px; 
            width: 100%; 
            padding: 12px; 
            background: #c0392b; 
            color: #fff; 
            border: 2px solid #e74c3c; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        button:hover { background: #e74c3c; }
        #readout { 
            margin-top: 20px; 
            background: #110d0a; 
            padding: 10px; 
            border: 1px dashed #634e3d; 
            color: #2ecc71; 
            font-size: 11px; 
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div>
        <h2>🔥 Particle Forge: Magic Beams</h2>
        <div class="canvas-container">
            <canvas id="forgeCanvas" width="480" height="480"></canvas>
        </div>
        <p style="text-align: center; font-size: 12px; color: #bbaaa0;">Click anywhere on the grid to cast a spell.</p>
    </div>

    <div class="panel">
        <h3 style="border-bottom: 1px dashed #634e3d; padding-bottom: 10px;">Interpolation Controls</h3>
        
        <label>Spell Element</label>
        <select id="beam-style">
            <option value="fire">Fireball (Reds/Oranges)</option>
            <option value="arcane">Arcane Laser (Purples/Blues)</option>
            <option value="poison">Toxic Spit (Greens)</option>
        </select>
        
        <label>Particle Density <span id="val-density" class="slider-val">12px</span></label>
        <input type="range" id="density" min="2" max="30" value="12" oninput="updateVals()">
        
        <label>Spread Volatility <span id="val-spread" class="slider-val">15px</span></label>
        <input type="range" id="spread" min="0" max="50" value="15" oninput="updateVals()">
        
        <label>Travel Speed (ms/frame) <span id="val-speed" class="slider-val">15ms</span></label>
        <input type="range" id="speed" min="2" max="50" value="15" oninput="updateVals()">
        
        <button onclick="activeParticles = []">✖ Clear Canvas</button>
        
        <div id="readout">
            <i>Awaiting click targeting...</i>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('forgeCanvas');
        const ctx = canvas.getContext('2d');
        const tileSize = 60; // Standard Pub Knights tile size
        let activeParticles = [];

        function updateVals() {
            document.getElementById('val-density').innerText = document.getElementById('density').value + "px";
            document.getElementById('val-spread').innerText = document.getElementById('spread').value + "px";
            document.getElementById('val-speed').innerText = document.getElementById('speed').value + "ms";
        }

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw tactical floor
            ctx.strokeStyle = '#3a2f26';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 8; i++) {
                ctx.beginPath(); ctx.moveTo(i * tileSize, 0); ctx.lineTo(i * tileSize, 480); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * tileSize); ctx.lineTo(480, i * i * tileSize); ctx.stroke();
            }

            // Draw Player Mockup at Tile [3, 3]
            let px = 3 * tileSize;
            let py = 3 * tileSize;
            
            // Subtle selection ring
            ctx.fillStyle = 'rgba(241, 196, 15, 0.2)';
            ctx.fillRect(px, py, tileSize, tileSize);
            
            // Player Block
            ctx.fillStyle = '#3498db';
            ctx.fillRect(px + 15, py + 10, 30, 40);
            ctx.fillStyle = '#fff';
            ctx.font = "bold 14px Courier";
            ctx.fillText('P1', px + 21, py + 35);
        }

        // === THE CORE VECTOR MATH ===
        function spawnBeamTest(startX, startY, endX, endY) {
            const style = document.getElementById('beam-style').value;
            const density = parseInt(document.getElementById('density').value);
            const spread = parseInt(document.getElementById('spread').value);
            const speed = parseInt(document.getElementById('speed').value);
            
            // Find center of start/end tiles
            let pxStart = (startX * tileSize) + (tileSize / 2);
            let pyStart = (startY * tileSize) + (tileSize / 2);
            let pxEnd = (endX * tileSize) + (tileSize / 2);
            let pyEnd = (endY * tileSize) + (tileSize / 2);

            // Calculate distance
            let dx = pxEnd - pxStart;
            let dy = pyEnd - pyStart;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            // Determine overlapping particle count based on density slider
            let particleCount = Math.floor(distance / density);
            if(particleCount < 1) particleCount = 1;
            
            // Update UI Readout
            document.getElementById('readout').innerHTML = `
                <b>Target Grid:</b> [${endX}, ${endY}]<br>
                <b>Vector Distance:</b> ${Math.round(distance)} pixels<br>
                <b>Particles Generated:</b> ${particleCount}
            `;

            // Setup Color Palette
            let colors = [];
            if (style === 'fire') colors = ['#e74c3c', '#f1c40f', '#d35400', '#ffffff'];
            else if (style === 'arcane') colors = ['#9b59b6', '#8e44ad', '#3498db', '#e056fd'];
            else if (style === 'poison') colors = ['#2ecc71', '#27ae60', '#f1c40f', '#1abc9c'];

            // Loop to spawn particles
            for (let i = 0; i <= particleCount; i++) {
                setTimeout(() => {
                    let progress = i / particleCount;
                    let currentX = pxStart + (dx * progress);
                    let currentY = pyStart + (dy * progress);
                    
                    let scatterX = (Math.random() - 0.5) * spread;
                    let scatterY = (Math.random() - 0.5) * spread;

                    activeParticles.push({
                        x: currentX + scatterX,
                        y: currentY + scatterY,
                        radius: 6 + Math.random() * 8, // Vary size
                        color: colors[Math.floor(Math.random() * colors.length)],
                        life: 1.0,
                        decay: 0.02 + (Math.random() * 0.04) // Vary fade speed
                    });
                }, i * speed); // The delay creates the movement!
            }
        }

        // Event Listener for Canvas Clicks
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            
            const targetGridX = Math.floor(clickX / tileSize);
            const targetGridY = Math.floor(clickY / tileSize);
            
            // Player is locked at 3,3 for this simulation
            spawnBeamTest(3, 3, targetGridX, targetGridY);
        });

        // The Master Render Loop
        function animate() {
            drawGrid();
            
            // Iterate backwards to safely remove dead particles
            for (let i = activeParticles.length - 1; i >= 0; i--) {
                let p = activeParticles[i];
                p.life -= p.decay;
                p.radius -= (p.decay * 5); // Shrink the fire as it dies
                
                // Culling
                if (p.life <= 0 || p.radius <= 0) {
                    activeParticles.splice(i, 1);
                    continue;
                }
                
                // Draw Particle
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
            
            requestAnimationFrame(animate);
        }

        // Start Engine
        animate();
    </script>
</body>
</html>

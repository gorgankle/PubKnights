<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pub Knights - Melee Combat Animation Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1a1a; color: #e5e5e5; font-family: 'Courier New', Courier, monospace; }

</head>
<body class="min-h-screen flex flex-col p-6">

    <div class="max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- UI CONTROLS (Left Column) -->

            <div>

                <p class="text-sm text-gray-400">Targeted Melee Animation Profiler</p>

            <!-- Profile Selector -->
            <div>
                <label class="block text-sm font-bold mb-2 text-gray-300">Base Animation Rig</label>
                <select id="profileSelect" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white outline-none focus:border-yellow-500">
                    <option value="lunge_slash">Lunge Slash</option>
                    <option value="jump_smash">Jump Smash</option>
                    <option value="flurry">Flurry (Multi-Hit)</option>
                    <option value="thrust">Thrust / Stab</option>
                    <option value="spin_cleave">Spin Cleave (360)</option>
                    <option value="double_strike">Double Strike (2-Hit)</option>
                    <option value="heavy_cleave">Heavy Cleave (Windup)</option>

            </div>

            <!-- Kinematic Tuners -->
            <div class="bg-gray-900 p-3 rounded border border-gray-700">
                <p class="text-xs text-gray-400 mb-3 font-bold uppercase tracking-wider">Physical Kinematics</p>
                <div class="mb-3">
                    <label class="block text-xs font-bold text-blue-400">Lunge Distance: <span id="lungeScaleText" class="text-white">0.4</span></label>

                <div class="mb-3">

                    <input type="range" id="swingArc" min="0.0" max="3.0" step="0.1" value="1.0" class="w-full">

                        <label class="block text-xs font-bold text-green-400 mb-1">FX Scale: <span id="overlayScaleText" class="text-white">0.6</span></label>

                        <input type="range" id="overlayOffsetX" min="-60" max="60" step="1" value="0" class="w-full">

                        <select id="targetSelect" class="w-full bg-gray-800 border border-gray-600 rounded p-1 text-xs text-white outline-none focus:border-yellow-500"></select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-yellow-500">Pivot X: <span id="pivotXText">14</span></label>
                        <input type="range" id="pivotX" min="0" max="24" step="1" value="14" class="w-full">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-yellow-500">Pivot Y: <span id="pivotYText">14</span></label>
                        <input type="range" id="pivotY" min="0" max="24" step="1" value="14" class="w-full">

                </div>

            <!-- Action Controls -->
            <div class="flex gap-2 mt-auto">
                <button id="playBtn" class="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded transition-colors shadow-lg">
                    ▶ Play Anim

                <button id="pauseBtn" class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-3 px-4 rounded transition-colors shadow-lg">
                    ⏸ Pause

        <!-- CANVAS & EXPORT VISUALIZER (Right Column) -->

            <!-- Timeline -->
            <div class="bg-gray-900 p-4 rounded-lg border border-gray-700 flex flex-col shadow-inner">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-sm font-bold text-gray-300">Duration: <span id="speedText" class="text-yellow-400">1000ms</span></label>
                    <input type="range" id="speedSlider" min="200" max="2000" step="50" value="1000" class="w-48">

                <label class="block text-sm font-bold mb-2 text-yellow-500 mt-2">
                    Frame Timeline: <span id="progressText" class="text-white">0.000</span>

                <div class="flex justify-between text-xs text-gray-500 mt-1 px-1">
                    <span>0.0 (Start)</span><span>0.5</span><span>1.0 (End)</span>
                </div>
            </div>

            <!-- Canvas Container -->
            <div class="flex flex-col items-center justify-center relative bg-gray-900 rounded-lg shadow-inner overflow-hidden border-2 border-gray-700 h-[480px]">
                <canvas id="fxCanvas" width="840" height="480" class="max-w-full shadow-2xl"></canvas>
                
                <div class="absolute bottom-4 left-4 right-4 bg-gray-800/90 p-4 rounded-lg border border-gray-600 flex justify-between items-center backdrop-blur-sm">
                    <p class="text-sm text-gray-300">
                        Map Target: <span class="text-yellow-500 font-mono">ΔX: <span id="dxReadout">3</span> | ΔY: <span id="dyReadout">0</span></span>
                    </p>
                    <button id="exportBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded transition-colors shadow-lg">
                        📋 Generate Single Profile Code Below
                    </button>
                </div>
            </div>

            <!-- EXPORT PANEL -->
            <div class="bg-gray-800 p-4 rounded-lg shadow-lg border border-gray-700 flex flex-col">
                <h3 class="text-yellow-500 font-bold text-lg mb-2">Exported Action Profile (<span id="exportTitle" class="text-white">lunge_slash</span>)</h3>
                <p class="text-xs text-gray-400 mb-2">Copy this directly into the <span class="text-blue-300 font-mono">MeleeAnimProfiles</span> object in <span class="text-blue-300 font-mono">fx-engine.js</span>.</p>
                <textarea id="exportArea" class="w-full bg-gray-900 text-green-400 font-mono text-sm p-4 rounded border border-gray-600 h-64 outline-none resize-y shadow-inner" readonly placeholder="Click 'Generate Single Profile Code' to output the tailored JavaScript block here..."></textarea>
            </div>

        </div>
    </div>

<script src="js/character-creator.js"></script>

<script src="js/map-assets.js"></script>

<script>
// ==========================================================
// === LIVE SANDBOX KINEMATICS ENGINE ===
// ==========================================================

// Helpers to fetch live UI values
const getLs = () => parseFloat(document.getElementById('lungeScale').value);
const getHh = () => parseFloat(document.getElementById('hopHeight').value);
const getArc = () => parseFloat(document.getElementById('swingArc').value);
const getStart = () => parseFloat(document.getElementById('impactStart').value);
const getEnd = () => parseFloat(document.getElementById('impactEnd').value);

const getOs = () => parseFloat(document.getElementById('overlayScale').value);
const getShape = () => document.getElementById('overlayShape').value;
const getOx = () => parseInt(document.getElementById('overlayOffsetX').value);
const getOy = () => parseInt(document.getElementById('overlayOffsetY').value);

// Shared Renderer for the Visualizer
function previewShape(ctx, tileSize, fillStyle, strokeStyle) {
    let shape = getShape();
    let os = getOs();
    let ox = getOx();
    let oy = getOy();
    
    ctx.save();
    if (ox !== 0 || oy !== 0) ctx.translate(ox, oy);
    
    if (fillStyle) ctx.fillStyle = fillStyle;
    if (strokeStyle) ctx.strokeStyle = strokeStyle;

    ctx.beginPath();
    if (shape === 'arc') {
        ctx.arc(0, 0, tileSize * os, -Math.PI/4, Math.PI/4);
        if (fillStyle) ctx.fill(); else if (strokeStyle) ctx.stroke();
    } else if (shape === 'circle') {
        ctx.arc(0, 0, tileSize * os, 0, Math.PI * 2);
        if (fillStyle) ctx.fill(); else if (strokeStyle) ctx.stroke();
    } else if (shape === 'triangle') {
        ctx.moveTo(0, -tileSize * os / 2);
        ctx.lineTo(tileSize * os, 0);
        ctx.lineTo(0, tileSize * os / 2);
        if (fillStyle) ctx.fill(); else if (strokeStyle) ctx.stroke();
    } else if (shape === 'pierce') {
        ctx.moveTo(0, -6);
        ctx.lineTo(tileSize * os, 0);
        ctx.lineTo(0, 6);
        if (fillStyle) ctx.fill(); else if (strokeStyle) ctx.stroke();
    } else if (shape === 'ring') {
        ctx.lineWidth = 4;
        ctx.arc(0, 0, tileSize * os, 0, Math.PI * 2);
        ctx.stroke(); // Always stroke a ring
    }
    ctx.restore();
}

const MeleeAnimProfiles = {
    'lunge_slash': {
        getOffsets: (progress, dx, dy) => {
            let amt = Math.sin(progress * Math.PI);
            return { x: dx * getLs() * amt, y: dy * getLs() * amt, hop: 0 };
        },
        getWeaponRotation: (progress) => {
            let s = getStart(), e = getEnd(), arc = getArc();
            if (progress < s) return -(progress / s) * (Math.PI / 2) * arc; 
            if (progress > e) return (Math.PI / 2) * arc; 
            let p = (progress - s) / (e - s); 
            return (-Math.PI/2 * arc) + (p * Math.PI * arc); 
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > getStart() && progress < getEnd()) {
                previewShape(ctx, tileSize, "rgba(255, 255, 255, 0.8)", null);
            }
        }
    },
    'jump_smash': {
        getOffsets: (progress, dx, dy) => {
            let amt = Math.sin(progress * Math.PI);
            return { x: dx * getLs() * amt, y: dy * getLs() * amt, hop: amt * getHh() }; 
        },
        getWeaponRotation: (progress) => {
            let s = getStart(), e = getEnd(), arc = getArc();
            if (progress < s) return -(progress / s) * Math.PI * arc; 
            if (progress > e) return (Math.PI / 4) * arc; 
            let p = (progress - s) / (e - s); 
            return (-Math.PI * arc) + (p * (Math.PI * 1.25) * arc); 
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > getStart() && progress < getEnd()) {
                previewShape(ctx, tileSize, "rgba(230, 126, 34, 0.7)", null);
            }
        }
    },
    'flurry': {
        getOffsets: (progress, dx, dy) => {
            let amt = Math.abs(Math.sin(progress * Math.PI * 3));
            return { x: dx * (getLs() / 2) * amt, y: dy * (getLs() / 2) * amt, hop: 0 };
        },
        getWeaponRotation: (progress) => {
            return Math.sin(progress * Math.PI * 6) * (Math.PI / 3) * getArc();
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > getStart() && progress < getEnd()) {
                let angleOffset = Math.sin(progress * Math.PI * 6) * (Math.PI / 4);
                ctx.save();
                ctx.rotate(angleOffset);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
                ctx.lineWidth = 4;
                previewShape(ctx, tileSize, null, "rgba(255, 255, 255, 0.9)");
                ctx.restore();
            }
        }
    },
    'thrust': {
        getOffsets: (progress, dx, dy) => {
            let amt = Math.sin(progress * Math.PI);
            return { x: dx * getLs() * amt, y: dy * getLs() * amt, hop: 0 };
        },
        getWeaponRotation: (progress) => {
            let s = getStart(), e = getEnd(), arc = getArc();
            if (progress < s) return -(progress / s) * (Math.PI / 8) * arc; 
            if (progress > e) return 0; 
            let p = (progress - s) / (e - s); 
            return (-Math.PI/8 * arc) + (p * Math.PI/8 * arc); 
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > getStart() && progress < getEnd()) {
                previewShape(ctx, tileSize, "rgba(241, 196, 15, 0.9)", null);
            }
        }
    },
    'spin_cleave': {
        getOffsets: (progress, dx, dy) => {
            let amt = Math.sin(progress * Math.PI);
            return { x: dx * (getLs() * 0.7) * amt, y: dy * (getLs() * 0.7) * amt, hop: 0 };
        },
        getWeaponRotation: (progress) => {
            return progress * Math.PI * 4 * getArc(); 
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > getStart() && progress < getEnd()) {
                ctx.lineWidth = 6;
                previewShape(ctx, tileSize, null, "rgba(231, 76, 60, 0.6)");
            }
        }
    },
    'double_strike': {
        getOffsets: (progress, dx, dy) => {
            // Sin wave multiplied by 2 gives us two smooth distinct lunges
            let amt = Math.max(0, Math.sin(progress * Math.PI * 2));
            return { x: dx * getLs() * amt, y: dy * getLs() * amt, hop: 0 };
        },
        getWeaponRotation: (progress) => {
            return Math.sin(progress * Math.PI * 2) * (Math.PI / 2) * getArc();
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > getStart() && progress < getEnd()) {
                let swingDir = Math.sin(progress * Math.PI * 2) > 0 ? 1 : -1;
                ctx.save();
                ctx.rotate(swingDir * (Math.PI/6)); // Alternate overlay angles
                previewShape(ctx, tileSize, "rgba(255, 255, 255, 0.8)", null);
                ctx.restore();
            }
        }
    },
    'heavy_cleave': {
        getOffsets: (progress, dx, dy) => {
            let s = getStart();
            if (progress < s) {
                // Negative windup (pulling back before the strike)
                let w = Math.sin((progress / s) * (Math.PI / 2));
                return { x: -dx * 0.2 * w, y: -dy * 0.2 * w, hop: 0 };
            } else {
                // Explosive forward launch
                let p = (progress - s) / (1 - s);
                let amt = Math.sin(p * Math.PI);
                return { x: dx * getLs() * amt, y: dy * getLs() * amt, hop: amt * getHh() };
            }
        },
        getWeaponRotation: (progress) => {
            let s = getStart(), e = getEnd(), arc = getArc();
            if (progress < s) return -(progress / s) * Math.PI * arc; // Pull weapon way back
            if (progress > e) return (Math.PI / 2) * arc; 
            let p = (progress - s) / (e - s); 
            return (-Math.PI * arc) + (p * (Math.PI * 1.5) * arc); // Huge swing arc
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > getStart() && progress < getEnd()) {
                previewShape(ctx, tileSize, "rgba(231, 76, 60, 0.9)", null);
            }
        }
    }
};

// ==========================================================
// === SANDBOX APPLICATION LOGIC ===
// ==========================================================

const canvas = document.getElementById('fxCanvas');
const ctx = canvas.getContext('2d');

const profileSelect = document.getElementById('profileSelect');
const weaponSelect = document.getElementById('weaponSelect');
const targetSelect = document.getElementById('targetSelect');
const speedSlider = document.getElementById('speedSlider');
const timelineScrubber = document.getElementById('timelineScrubber');
const playBtn = document.getElementById('playBtn');
const pauseBtn = document.getElementById('pauseBtn');
const exportBtn = document.getElementById('exportBtn');

const speedText = document.getElementById('speedText');
const progressText = document.getElementById('progressText');
const pivotXSlider = document.getElementById('pivotX');
const pivotYSlider = document.getElementById('pivotY');
const pivotXText = document.getElementById('pivotXText');
const pivotYText = document.getElementById('pivotYText');

const lungeScaleSlider = document.getElementById('lungeScale');
const hopHeightSlider = document.getElementById('hopHeight');
const swingArcSlider = document.getElementById('swingArc');
const impactStartSlider = document.getElementById('impactStart');
const impactEndSlider = document.getElementById('impactEnd');
const lungeScaleText = document.getElementById('lungeScaleText');
const hopHeightText = document.getElementById('hopHeightText');
const swingArcText = document.getElementById('swingArcText');
const impactStartText = document.getElementById('impactStartText');
const impactEndText = document.getElementById('impactEndText');

const overlayShapeSelect = document.getElementById('overlayShape');
const overlayScaleSlider = document.getElementById('overlayScale');
const overlayOffsetXSlider = document.getElementById('overlayOffsetX');
const overlayOffsetYSlider = document.getElementById('overlayOffsetY');
const overlayScaleText = document.getElementById('overlayScaleText');
const offsetXText = document.getElementById('offsetXText');
const offsetYText = document.getElementById('offsetYText');

// Simulation Constants
const TILE_SIZE = 60;
let START_X = 4 * TILE_SIZE; 
let START_Y = 4 * TILE_SIZE; 
let TARGET_X = 7 * TILE_SIZE; 
let TARGET_Y = 4 * TILE_SIZE; 

// Animation State
let currentProgress = 0;
let isPlaying = false;
let lastTime = 0;
let animationDuration = parseInt(speedSlider.value);
let animationFrameId;
let isDraggingTarget = false;

// --- Initialize Assets & Dropdowns ---
window.addEventListener('load', () => {
    if (typeof drawProceduralSprite !== 'function') {
        ctx.fillStyle = '#e74c3c'; ctx.font = '16px Courier New';
        ctx.fillText("❌ ASSET ERROR: Could not load JS files.", 50, 180);
        ctx.fillText("Make sure this file is inside your main project folder next to /js.", 50, 210);
        return;
    }

    if (typeof SpriteMatrices !== 'undefined') {
        Object.keys(SpriteMatrices).filter(k => k.startsWith('weap_') || k.includes('club') || k.includes('axe') || k.includes('dagger')).forEach(k => {
            let opt = document.createElement('option');
            opt.value = k; opt.innerText = k;
            weaponSelect.appendChild(opt);
        });

        const knownEnemies = ['publing', 'wild_ravager', 'alpha_poacher', 'corrupted_cask', 'enraged_gorilla', 'vintage_behemoth'];
        knownEnemies.forEach(k => {
            if (SpriteMatrices[k]) {
                let opt = document.createElement('option');
                opt.value = k; opt.innerText = k;
                targetSelect.appendChild(opt);
            }
        });
    }

    drawScene();
});

// --- UI Listeners ---
speedSlider.addEventListener('input', (e) => { animationDuration = parseInt(e.target.value); speedText.innerText = `${animationDuration}ms`; });
timelineScrubber.addEventListener('input', (e) => { isPlaying = false; currentProgress = parseFloat(e.target.value); drawScene(); });
pivotXSlider.addEventListener('input', (e) => { pivotXText.innerText = e.target.value; drawScene(); });
pivotYSlider.addEventListener('input', (e) => { pivotYText.innerText = e.target.value; drawScene(); });

// Kinematics Listeners
lungeScaleSlider.addEventListener('input', (e) => { lungeScaleText.innerText = e.target.value; drawScene(); });
hopHeightSlider.addEventListener('input', (e) => { hopHeightText.innerText = e.target.value; drawScene(); });
swingArcSlider.addEventListener('input', (e) => { swingArcText.innerText = e.target.value; drawScene(); });
impactStartSlider.addEventListener('input', (e) => { 
    if (parseFloat(e.target.value) >= parseFloat(impactEndSlider.value)) e.target.value = (parseFloat(impactEndSlider.value) - 0.05).toFixed(2);
    impactStartText.innerText = e.target.value; drawScene(); 
});
impactEndSlider.addEventListener('input', (e) => { 
    if (parseFloat(e.target.value) <= parseFloat(impactStartSlider.value)) e.target.value = (parseFloat(impactStartSlider.value) + 0.05).toFixed(2);
    impactEndText.innerText = e.target.value; drawScene(); 
});

// FX Listeners
overlayShapeSelect.addEventListener('change', drawScene);
overlayScaleSlider.addEventListener('input', (e) => { overlayScaleText.innerText = e.target.value; drawScene(); });
overlayOffsetXSlider.addEventListener('input', (e) => { offsetXText.innerText = e.target.value; drawScene(); });
overlayOffsetYSlider.addEventListener('input', (e) => { offsetYText.innerText = e.target.value; drawScene(); });

profileSelect.addEventListener('change', (e) => { 
    document.getElementById('exportTitle').innerText = e.target.value;
    drawScene(); 
});
weaponSelect.addEventListener('change', drawScene);
targetSelect.addEventListener('change', drawScene);

// --- Mouse Interaction for Target Placement ---
canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    
    const selectedTarget = targetSelect.value || 'publing';
    let tSize = selectedTarget.includes('behemoth') || selectedTarget.includes('overlord') ? 2 : 1;
    
    if (mx >= TARGET_X && mx <= TARGET_X + (TILE_SIZE * tSize) && my >= TARGET_Y && my <= TARGET_Y + (TILE_SIZE * tSize)) {
        isDraggingTarget = true;
    }
});
canvas.addEventListener('mousemove', (e) => {
    if (isDraggingTarget) {
        const rect = canvas.getBoundingClientRect();
        TARGET_X = Math.floor((e.clientX - rect.left) / TILE_SIZE) * TILE_SIZE; 
        TARGET_Y = Math.floor((e.clientY - rect.top) / TILE_SIZE) * TILE_SIZE;
        document.getElementById('dxReadout').innerText = (TARGET_X - START_X) / TILE_SIZE;
        document.getElementById('dyReadout').innerText = (TARGET_Y - START_Y) / TILE_SIZE;
        drawScene();
    }
});
canvas.addEventListener('mouseup', () => { isDraggingTarget = false; });
canvas.addEventListener('mouseleave', () => { isDraggingTarget = false; });

// --- Playback Controls ---
playBtn.addEventListener('click', () => {
    if (currentProgress >= 1.0) currentProgress = 0; 
    isPlaying = true;
    lastTime = performance.now();
    cancelAnimationFrame(animationFrameId);
    animationFrameId = requestAnimationFrame(animate); 
});
pauseBtn.addEventListener('click', () => { isPlaying = false; });

// --- SINGLE PROFILE EXPORT FUNCTION ---
function getExportShapeCode(os, ox, oy, isStroke = false) {
    let shape = getShape();
    let code = ``;
    if (ox !== 0 || oy !== 0) code += `ctx.translate(${ox}, ${oy}); `;
    
    let action = isStroke ? 'ctx.stroke();' : 'ctx.fill();';
    
    if (shape === 'arc') {
        code += `ctx.beginPath(); ctx.arc(0, 0, tileSize * ${os}, -Math.PI/4, Math.PI/4); ${action}`;
    } else if (shape === 'circle') {
        code += `ctx.beginPath(); ctx.arc(0, 0, tileSize * ${os}, 0, Math.PI * 2); ${action}`;
    } else if (shape === 'triangle') {
        code += `ctx.beginPath(); ctx.moveTo(0, -tileSize * ${os} / 2); ctx.lineTo(tileSize * ${os}, 0); ctx.lineTo(0, tileSize * ${os} / 2); ${action}`;
    } else if (shape === 'pierce') {
        code += `ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(tileSize * ${os}, 0); ctx.lineTo(0, 6); ${action}`;
    } else if (shape === 'ring') {
        code += `ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(0, 0, tileSize * ${os}, 0, Math.PI * 2); ctx.stroke();`;
    }
    return code;
}

exportBtn.addEventListener('click', () => {
    let pName = profileSelect.value;
    let ls = getLs();
    let hh = getHh();
    let arc = getArc();
    let s = getStart();
    let e = getEnd();
    
    let os = getOs();
    let ox = getOx();
    let oy = getOy();

    let block = `    '${pName}': {\n`;

    if (pName === 'lunge_slash') {
        block += `        getOffsets: (progress, dx, dy) => {\n            let amt = Math.sin(progress * Math.PI);\n            return { x: dx * ${ls} * amt, y: dy * ${ls} * amt, hop: 0 };\n        },\n`;
        block += `        getWeaponRotation: (progress) => {\n            if (progress < ${s}) return -(progress / ${s}) * (Math.PI / 2) * ${arc};\n            if (progress > ${e}) return (Math.PI / 2) * ${arc};\n            let p = (progress - ${s}) / (${e} - ${s});\n            return (-Math.PI/2 * ${arc}) + (p * Math.PI * ${arc});\n        },\n`;
        block += `        drawOverlay: (ctx, progress, tileSize) => {\n            if (progress > ${s} && progress < ${e}) {\n                ctx.fillStyle = "rgba(255, 255, 255, 0.8)";\n                ${getExportShapeCode(os, ox, oy, false)}\n            }\n        }\n`;
    } 
    else if (pName === 'jump_smash') {
        block += `        getOffsets: (progress, dx, dy) => {\n            let amt = Math.sin(progress * Math.PI);\n            return { x: dx * ${ls} * amt, y: dy * ${ls} * amt, hop: amt * ${hh} };\n        },\n`;
        block += `        getWeaponRotation: (progress) => {\n            if (progress < ${s}) return -(progress / ${s}) * Math.PI * ${arc};\n            if (progress > ${e}) return (Math.PI / 4) * ${arc};\n            let p = (progress - ${s}) / (${e} - ${s});\n            return (-Math.PI * ${arc}) + (p * (Math.PI * 1.25) * ${arc});\n        },\n`;
        block += `        drawOverlay: (ctx, progress, tileSize) => {\n            if (progress > ${s} && progress < ${e}) {\n                ctx.fillStyle = "rgba(230, 126, 34, 0.7)";\n                ${getExportShapeCode(os, ox, oy, false)}\n            }\n        }\n`;
    }
    else if (pName === 'flurry') {
        block += `        getOffsets: (progress, dx, dy) => {\n            let amt = Math.abs(Math.sin(progress * Math.PI * 3));\n            return { x: dx * ${ls/2} * amt, y: dy * ${ls/2} * amt, hop: 0 };\n        },\n`;
        block += `        getWeaponRotation: (progress) => {\n            return Math.sin(progress * Math.PI * 6) * (Math.PI / 3) * ${arc};\n        },\n`;
        block += `        drawOverlay: (ctx, progress, tileSize) => {\n            if (progress > ${s} && progress < ${e}) {\n                let angleOffset = Math.sin(progress * Math.PI * 6) * (Math.PI / 4);\n                ctx.save(); ctx.rotate(angleOffset); ctx.strokeStyle = "rgba(255, 255, 255, 0.9)"; ctx.lineWidth = 4;\n                ${getExportShapeCode(os, ox, oy, true)}\n                ctx.restore();\n            }\n        }\n`;
    }
    else if (pName === 'thrust') {
        block += `        getOffsets: (progress, dx, dy) => {\n            let amt = Math.sin(progress * Math.PI);\n            return { x: dx * ${ls} * amt, y: dy * ${ls} * amt, hop: 0 };\n        },\n`;
        block += `        getWeaponRotation: (progress) => {\n            if (progress < ${s}) return -(progress / ${s}) * (Math.PI / 8) * ${arc};\n            if (progress > ${e}) return 0;\n            let p = (progress - ${s}) / (${e} - ${s});\n            return (-Math.PI/8 * ${arc}) + (p * Math.PI/8 * ${arc});\n        },\n`;
        block += `        drawOverlay: (ctx, progress, tileSize) => {\n            if (progress > ${s} && progress < ${e}) {\n                ctx.fillStyle = "rgba(241, 196, 15, 0.9)";\n                ${getExportShapeCode(os, ox, oy, false)}\n            }\n        }\n`;
    }
    else if (pName === 'spin_cleave') {
        block += `        getOffsets: (progress, dx, dy) => {\n            let amt = Math.sin(progress * Math.PI);\n            return { x: dx * ${ls * 0.7} * amt, y: dy * ${ls * 0.7} * amt, hop: 0 };\n        },\n`;
        block += `        getWeaponRotation: (progress) => {\n            return progress * Math.PI * 4 * ${arc};\n        },\n`;
        block += `        drawOverlay: (ctx, progress, tileSize) => {\n            if (progress > ${s} && progress < ${e}) {\n                ctx.strokeStyle = "rgba(231, 76, 60, 0.6)"; ctx.lineWidth = 6;\n                ${getExportShapeCode(os, ox, oy, true)}\n            }\n        }\n`;
    }
    else if (pName === 'double_strike') {
        block += `        getOffsets: (progress, dx, dy) => {\n            let amt = Math.max(0, Math.sin(progress * Math.PI * 2));\n            return { x: dx * ${ls} * amt, y: dy * ${ls} * amt, hop: 0 };\n        },\n`;
        block += `        getWeaponRotation: (progress) => {\n            return Math.sin(progress * Math.PI * 2) * (Math.PI / 2) * ${arc};\n        },\n`;
        block += `        drawOverlay: (ctx, progress, tileSize) => {\n            if (progress > ${s} && progress < ${e}) {\n                let swingDir = Math.sin(progress * Math.PI * 2) > 0 ? 1 : -1;\n                ctx.save(); ctx.rotate(swingDir * (Math.PI/6)); ctx.fillStyle = "rgba(255, 255, 255, 0.8)";\n                ${getExportShapeCode(os, ox, oy, false)}\n                ctx.restore();\n            }\n        }\n`;
    }
    else if (pName === 'heavy_cleave') {
        block += `        getOffsets: (progress, dx, dy) => {\n            if (progress < ${s}) {\n                let w = Math.sin((progress / ${s}) * (Math.PI / 2));\n                return { x: -dx * 0.2 * w, y: -dy * 0.2 * w, hop: 0 };\n            } else {\n                let p = (progress - ${s}) / (1 - ${s});\n                let amt = Math.sin(p * Math.PI);\n                return { x: dx * ${ls} * amt, y: dy * ${ls} * amt, hop: amt * ${hh} };\n            }\n        },\n`;
        block += `        getWeaponRotation: (progress) => {\n            if (progress < ${s}) return -(progress / ${s}) * Math.PI * ${arc};\n            if (progress > ${e}) return (Math.PI / 2) * ${arc};\n            let p = (progress - ${s}) / (${e} - ${s});\n            return (-Math.PI * ${arc}) + (p * (Math.PI * 1.5) * ${arc});\n        },\n`;
        block += `        drawOverlay: (ctx, progress, tileSize) => {\n            if (progress > ${s} && progress < ${e}) {\n                ctx.fillStyle = "rgba(231, 76, 60, 0.9)";\n                ${getExportShapeCode(os, ox, oy, false)}\n            }\n        }\n`;
    }

    block += `    }`;
    
    const exportArea = document.getElementById('exportArea');
    exportArea.value = block;
    
    try {
        exportArea.select();
        document.execCommand('copy');
        
        let originalText = exportBtn.innerText;
        exportBtn.innerText = "✅ COPIED TO CLIPBOARD!";
        exportBtn.classList.remove('bg-blue-600', 'hover:bg-blue-500');
        exportBtn.classList.add('bg-green-600', 'hover:bg-green-500');
        
        setTimeout(() => { 
            exportBtn.innerText = originalText; 
            exportBtn.classList.remove('bg-green-600', 'hover:bg-green-500');
            exportBtn.classList.add('bg-blue-600', 'hover:bg-blue-500');
        }, 2000);
    } catch (err) {
        console.warn("Clipboard auto-copy failed. Text is available for manual copying.");
        exportBtn.innerText = "Code Generated! (Manually Copy Below)";
        setTimeout(() => { exportBtn.innerText = "📋 Generate Single Profile Code Below"; }, 3000);
    }
});

// --- Core Render Loop ---
function animate(timestamp) {
    if (!isPlaying) return;

    if (!lastTime) lastTime = timestamp;
    const deltaTime = timestamp - lastTime;
    lastTime = timestamp;

    currentProgress += deltaTime / animationDuration;

    if (currentProgress >= 1.0) {
        currentProgress = 1.0;
        isPlaying = false;
    }

    timelineScrubber.value = currentProgress;
    drawScene();

    if (isPlaying) {
        animationFrameId = requestAnimationFrame(animate);
    }
}

function drawScene() {
    if (typeof drawProceduralSprite !== 'function') return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (SpriteMatrices['ground_wilderness']) {
        for(let x = 0; x < canvas.width; x += TILE_SIZE) {
            for(let y = 0; y < canvas.height; y += TILE_SIZE) {
                drawProceduralSprite(ctx, SpriteMatrices['ground_wilderness'], x, y, TILE_SIZE);
            }
        }
    }
    
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
    ctx.lineWidth = 1;
    for(let x = 0; x < canvas.width; x += TILE_SIZE) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for(let y = 0; y < canvas.height; y += TILE_SIZE) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }

    progressText.innerText = currentProgress.toFixed(3);

    const selectedTarget = targetSelect.value || 'publing';
    let tSize = selectedTarget.includes('behemoth') || selectedTarget.includes('overlord') ? 2 : 1;

    let centerStartX = START_X + TILE_SIZE/2;
    let centerStartY = START_Y + TILE_SIZE/2;
    let centerTargetX = TARGET_X + (TILE_SIZE * tSize)/2;
    let centerTargetY = TARGET_Y + (TILE_SIZE * tSize)/2;

    let DX = centerTargetX - centerStartX;
    let DY = centerTargetY - centerStartY;

    const activeProfile = MeleeAnimProfiles[profileSelect.value];
    const offsets = activeProfile.getOffsets(currentProgress, DX, DY);

    const attackerX = START_X + offsets.x;
    const attackerY = START_Y + offsets.y - offsets.hop; 

    // Draw Target Enemy
    if (SpriteMatrices[selectedTarget]) {
        drawProceduralSprite(ctx, SpriteMatrices[selectedTarget], TARGET_X, TARGET_Y, TILE_SIZE * tSize);
        
        if (isDraggingTarget || Math.abs(currentProgress) === 0) {
            ctx.strokeStyle = 'rgba(231, 76, 60, 0.8)';
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(TARGET_X, TARGET_Y, TILE_SIZE * tSize, TILE_SIZE * tSize);
            ctx.setLineDash([]);
        }
    }

    // Draw Attacker Anatomy
    drawProceduralSprite(ctx, SpriteMatrices['body_male'], attackerX, attackerY, TILE_SIZE);
    drawProceduralSprite(ctx, SpriteMatrices['eyes_blue'], attackerX, attackerY, TILE_SIZE);
    drawProceduralSprite(ctx, SpriteMatrices['hair_messy'], attackerX, attackerY, TILE_SIZE);

    // Draw Weapon with True Pivot Mechanics
    const selWeapon = weaponSelect.value || 'weap_rusty_mace';
    if (SpriteMatrices[selWeapon]) {
        ctx.save();
        
        let handAnchorX = attackerX + (TILE_SIZE * 0.58);
        let handAnchorY = attackerY + (TILE_SIZE * 0.5);

        ctx.translate(handAnchorX, handAnchorY);

        let baseAngle = Math.atan2(DY, DX); 
        let animAngle = activeProfile.getWeaponRotation ? activeProfile.getWeaponRotation(currentProgress) : 0;
        
        ctx.rotate(baseAngle + animAngle - (Math.PI / 4)); 

        let pX = parseInt(pivotXSlider.value);
        let pY = parseInt(pivotYSlider.value);
        let pivotOffsetX = (pX / 24) * TILE_SIZE;
        let pivotOffsetY = (pY / 24) * TILE_SIZE;

        ctx.translate(-pivotOffsetX, -pivotOffsetY);
        drawProceduralSprite(ctx, SpriteMatrices[selWeapon], 0, 0, TILE_SIZE);

        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.arc(pivotOffsetX, pivotOffsetY, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    // Draw Visual Overlay (Arcs & Slashes mapped over TARGET center)
    let angle = Math.atan2(DY, DX);
    ctx.save();
    ctx.translate(centerTargetX, centerTargetY);
    ctx.rotate(angle);
    activeProfile.drawOverlay(ctx, currentProgress, TILE_SIZE);
    ctx.restore();
}

</script>

<script>
// ==========================================================
// === LIVE SANDBOX KINEMATICS ENGINE ===
// ==========================================================

// Helpers to fetch live UI values
const getLs = () => parseFloat(document.getElementById('lungeScale').value);
const getOs = () => parseFloat(document.getElementById('overlayScale').value);
const getHh = () => parseFloat(document.getElementById('hopHeight').value);

const getShape = () => document.getElementById('overlayShape').value;
const getOx = () => parseInt(document.getElementById('overlayOffsetX').value);
const getOy = () => parseInt(document.getElementById('overlayOffsetY').value);

// Shared Renderer for the Visualizer
function previewShape(ctx, tileSize, fillStyle, strokeStyle) {
    let shape = getShape();
    let os = getOs();
    let ox = getOx();
    let oy = getOy();
    
    ctx.save();
    if (ox !== 0 || oy !== 0) ctx.translate(ox, oy);
    
    if (fillStyle) ctx.fillStyle = fillStyle;
    if (strokeStyle) ctx.strokeStyle = strokeStyle;

    ctx.beginPath();
    if (shape === 'arc') {
        ctx.arc(0, 0, tileSize * os, -Math.PI/4, Math.PI/4);
        if (fillStyle) ctx.fill(); else if (strokeStyle) ctx.stroke();
    } else if (shape === 'circle') {
        ctx.arc(0, 0, tileSize * os, 0, Math.PI * 2);
        if (fillStyle) ctx.fill(); else if (strokeStyle) ctx.stroke();
    } else if (shape === 'triangle') {
        ctx.moveTo(0, -tileSize * os / 2);
        ctx.lineTo(tileSize * os, 0);
        ctx.lineTo(0, tileSize * os / 2);
        if (fillStyle) ctx.fill(); else if (strokeStyle) ctx.stroke();
    } else if (shape === 'pierce') {
        ctx.moveTo(0, -6);
        ctx.lineTo(tileSize * os, 0);
        ctx.lineTo(0, 6);
        if (fillStyle) ctx.fill(); else if (strokeStyle) ctx.stroke();
    } else if (shape === 'ring') {
        ctx.lineWidth = 4;
        ctx.arc(0, 0, tileSize * os, 0, Math.PI * 2);
        ctx.stroke(); // Always stroke a ring
    }
    ctx.restore();
}

const MeleeAnimProfiles = {
    'lunge_slash': {
        getOffsets: (progress, dx, dy) => {
            let amt = Math.sin(progress * Math.PI);
            return { x: dx * getLs() * amt, y: dy * getLs() * amt, hop: 0 };
        },
        getWeaponRotation: (progress) => {
            if (progress < 0.4) return -(progress / 0.4) * (Math.PI / 2); 
            if (progress > 0.7) return Math.PI / 2; 
            let p = (progress - 0.4) / 0.3; 
            return -Math.PI/2 + (p * Math.PI); 
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > 0.4 && progress < 0.7) {
                previewShape(ctx, tileSize, "rgba(255, 255, 255, 0.8)", null);
            }
        }
    },
    'jump_smash': {
        getOffsets: (progress, dx, dy) => {
            let amt = Math.sin(progress * Math.PI);
            return { x: dx * getLs() * amt, y: dy * getLs() * amt, hop: amt * getHh() }; 
        },
        getWeaponRotation: (progress) => {
            if (progress < 0.4) return -(progress / 0.4) * Math.PI; 
            if (progress > 0.7) return Math.PI / 4; 
            let p = (progress - 0.4) / 0.3; 
            return -Math.PI + (p * (Math.PI * 1.25)); 
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > 0.4 && progress < 0.7) {
                previewShape(ctx, tileSize, "rgba(230, 126, 34, 0.7)", null);
            }
        }
    },
    'flurry': {
        getOffsets: (progress, dx, dy) => {
            let amt = Math.abs(Math.sin(progress * Math.PI * 3));
            return { x: dx * (getLs() / 2) * amt, y: dy * (getLs() / 2) * amt, hop: 0 };
        },
        getWeaponRotation: (progress) => {
            return Math.sin(progress * Math.PI * 6) * (Math.PI / 3);
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > 0.2 && progress < 0.8) {
                let angleOffset = Math.sin(progress * Math.PI * 6) * (Math.PI / 4);
                ctx.save();
                ctx.rotate(angleOffset);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
                ctx.lineWidth = 4;
                previewShape(ctx, tileSize, null, "rgba(255, 255, 255, 0.9)");
                ctx.restore();
            }
        }
    },
    'thrust': {
        getOffsets: (progress, dx, dy) => {
            let amt = Math.sin(progress * Math.PI);
            return { x: dx * getLs() * amt, y: dy * getLs() * amt, hop: 0 };
        },
        getWeaponRotation: (progress) => {
            if (progress < 0.4) return -(progress / 0.4) * (Math.PI / 8); 
            if (progress > 0.7) return 0; 
            let p = (progress - 0.4) / 0.3; 
            return -Math.PI/8 + (p * Math.PI/8); 
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > 0.4 && progress < 0.7) {
                previewShape(ctx, tileSize, "rgba(241, 196, 15, 0.9)", null);
            }
        }
    },
    'spin_cleave': {
        getOffsets: (progress, dx, dy) => {
            let amt = Math.sin(progress * Math.PI);
            return { x: dx * (getLs() * 0.7) * amt, y: dy * (getLs() * 0.7) * amt, hop: 0 };
        },
        getWeaponRotation: (progress) => {
            return progress * Math.PI * 4; 
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > 0.3 && progress < 0.8) {
                ctx.lineWidth = 6;
                previewShape(ctx, tileSize, null, "rgba(231, 76, 60, 0.6)");
            }
        }
    }
};

// ==========================================================
// === SANDBOX APPLICATION LOGIC ===
// ==========================================================

const canvas = document.getElementById('fxCanvas');
const ctx = canvas.getContext('2d');

const profileSelect = document.getElementById('profileSelect');
const weaponSelect = document.getElementById('weaponSelect');
const targetSelect = document.getElementById('targetSelect');
const speedSlider = document.getElementById('speedSlider');
const timelineScrubber = document.getElementById('timelineScrubber');
const playBtn = document.getElementById('playBtn');
const pauseBtn = document.getElementById('pauseBtn');
const exportBtn = document.getElementById('exportBtn');

const speedText = document.getElementById('speedText');
const progressText = document.getElementById('progressText');
const pivotXSlider = document.getElementById('pivotX');
const pivotYSlider = document.getElementById('pivotY');
const pivotXText = document.getElementById('pivotXText');
const pivotYText = document.getElementById('pivotYText');

const lungeScaleSlider = document.getElementById('lungeScale');
const hopHeightSlider = document.getElementById('hopHeight');
const lungeScaleText = document.getElementById('lungeScaleText');
const hopHeightText = document.getElementById('hopHeightText');

// NEW FX Controls
const overlayShapeSelect = document.getElementById('overlayShape');
const overlayScaleSlider = document.getElementById('overlayScale');
const overlayOffsetXSlider = document.getElementById('overlayOffsetX');
const overlayOffsetYSlider = document.getElementById('overlayOffsetY');
const overlayScaleText = document.getElementById('overlayScaleText');
const offsetXText = document.getElementById('offsetXText');
const offsetYText = document.getElementById('offsetYText');

// Simulation Constants
const TILE_SIZE = 60;
let START_X = 4 * TILE_SIZE; 
let START_Y = 4 * TILE_SIZE; 
let TARGET_X = 7 * TILE_SIZE; 
let TARGET_Y = 4 * TILE_SIZE; 

// Animation State
let currentProgress = 0;
let isPlaying = false;
let lastTime = 0;
let animationDuration = parseInt(speedSlider.value);
let animationFrameId;
let isDraggingTarget = false;

// --- Initialize Assets & Dropdowns ---
window.addEventListener('load', () => {
    if (typeof drawProceduralSprite !== 'function') {
        ctx.fillStyle = '#e74c3c'; ctx.font = '16px Courier New';
        ctx.fillText("❌ ASSET ERROR: Could not load JS files.", 50, 180);
        ctx.fillText("Make sure this file is inside your main project folder next to /js.", 50, 210);
        return;
    }

    if (typeof SpriteMatrices !== 'undefined') {
        Object.keys(SpriteMatrices).filter(k => k.startsWith('weap_') || k.includes('club') || k.includes('axe') || k.includes('dagger')).forEach(k => {
            let opt = document.createElement('option');
            opt.value = k; opt.innerText = k;
            weaponSelect.appendChild(opt);
        });

        const knownEnemies = ['publing', 'wild_ravager', 'alpha_poacher', 'corrupted_cask', 'enraged_gorilla', 'vintage_behemoth'];
        knownEnemies.forEach(k => {
            if (SpriteMatrices[k]) {
                let opt = document.createElement('option');
                opt.value = k; opt.innerText = k;
                targetSelect.appendChild(opt);
            }
        });
    }

    drawScene();
});

// --- UI Listeners ---
speedSlider.addEventListener('input', (e) => { animationDuration = parseInt(e.target.value); speedText.innerText = `${animationDuration}ms`; });
timelineScrubber.addEventListener('input', (e) => { isPlaying = false; currentProgress = parseFloat(e.target.value); drawScene(); });
pivotXSlider.addEventListener('input', (e) => { pivotXText.innerText = e.target.value; drawScene(); });
pivotYSlider.addEventListener('input', (e) => { pivotYText.innerText = e.target.value; drawScene(); });
lungeScaleSlider.addEventListener('input', (e) => { lungeScaleText.innerText = e.target.value; drawScene(); });
hopHeightSlider.addEventListener('input', (e) => { hopHeightText.innerText = e.target.value; drawScene(); });

// FX Listeners
overlayShapeSelect.addEventListener('change', drawScene);
overlayScaleSlider.addEventListener('input', (e) => { overlayScaleText.innerText = e.target.value; drawScene(); });
overlayOffsetXSlider.addEventListener('input', (e) => { offsetXText.innerText = e.target.value; drawScene(); });
overlayOffsetYSlider.addEventListener('input', (e) => { offsetYText.innerText = e.target.value; drawScene(); });

profileSelect.addEventListener('change', drawScene);
weaponSelect.addEventListener('change', drawScene);
targetSelect.addEventListener('change', drawScene);

// --- Mouse Interaction for Target Placement ---
canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    
    const selectedTarget = targetSelect.value || 'publing';
    let tSize = selectedTarget.includes('behemoth') || selectedTarget.includes('overlord') ? 2 : 1;
    
    if (mx >= TARGET_X && mx <= TARGET_X + (TILE_SIZE * tSize) && 
        my >= TARGET_Y && my <= TARGET_Y + (TILE_SIZE * tSize)) {
        isDraggingTarget = true;
    }
});
canvas.addEventListener('mousemove', (e) => {
    if (isDraggingTarget) {
        const rect = canvas.getBoundingClientRect();
        TARGET_X = Math.floor((e.clientX - rect.left) / TILE_SIZE) * TILE_SIZE; 
        TARGET_Y = Math.floor((e.clientY - rect.top) / TILE_SIZE) * TILE_SIZE;
        document.getElementById('dxReadout').innerText = (TARGET_X - START_X) / TILE_SIZE;
        document.getElementById('dyReadout').innerText = (TARGET_Y - START_Y) / TILE_SIZE;
        drawScene();
    }
});
canvas.addEventListener('mouseup', () => { isDraggingTarget = false; });
canvas.addEventListener('mouseleave', () => { isDraggingTarget = false; });

// --- Playback Controls ---
playBtn.addEventListener('click', () => {
    if (currentProgress >= 1.0) currentProgress = 0; 
    isPlaying = true;
    lastTime = performance.now();
    cancelAnimationFrame(animationFrameId);
    animationFrameId = requestAnimationFrame(animate); 
});
pauseBtn.addEventListener('click', () => { isPlaying = false; });

// --- EXPORT FUNCTION ---
// Helper to generate the exact Canvas API strings depending on the selected Shape
function getExportShapeCode(os, ox, oy, isStroke = false) {
    let shape = getShape();
    let code = ``;
    if (ox !== 0 || oy !== 0) code += `ctx.translate(${ox}, ${oy}); `;
    
    let action = isStroke ? 'ctx.stroke();' : 'ctx.fill();';
    
    if (shape === 'arc') {
        code += `ctx.beginPath(); ctx.arc(0, 0, tileSize * ${os}, -Math.PI/4, Math.PI/4); ${action}`;
    } else if (shape === 'circle') {
        code += `ctx.beginPath(); ctx.arc(0, 0, tileSize * ${os}, 0, Math.PI * 2); ${action}`;
    } else if (shape === 'triangle') {
        code += `ctx.beginPath(); ctx.moveTo(0, -tileSize * ${os} / 2); ctx.lineTo(tileSize * ${os}, 0); ctx.lineTo(0, tileSize * ${os} / 2); ${action}`;
    } else if (shape === 'pierce') {
        code += `ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(tileSize * ${os}, 0); ctx.lineTo(0, 6); ${action}`;
    } else if (shape === 'ring') {
        code += `ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(0, 0, tileSize * ${os}, 0, Math.PI * 2); ctx.stroke();`;
    }
    return code;
}

exportBtn.addEventListener('click', () => {
    let ls = getLs();
    let os = getOs();
    let hh = getHh();
    let ox = getOx();
    let oy = getOy();

    let exportCode = `const MeleeAnimProfiles = {
    'lunge_slash': {
        getOffsets: (progress, dx, dy) => {
            let amt = Math.sin(progress * Math.PI);
            return { x: dx * ${ls} * amt, y: dy * ${ls} * amt, hop: 0 };
        },
        getWeaponRotation: (progress) => {
            if (progress < 0.4) return -(progress / 0.4) * (Math.PI / 2); 
            if (progress > 0.7) return Math.PI / 2; 
            let p = (progress - 0.4) / 0.3; 
            return -Math.PI/2 + (p * Math.PI); 
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > 0.4 && progress < 0.7) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
                ${getExportShapeCode(os, ox, oy, false)}
            }
        }
    },
    'jump_smash': {
        getOffsets: (progress, dx, dy) => {
            let amt = Math.sin(progress * Math.PI);
            return { x: dx * ${ls} * amt, y: dy * ${ls} * amt, hop: amt * ${hh} }; 
        },
        getWeaponRotation: (progress) => {
            if (progress < 0.4) return -(progress / 0.4) * Math.PI; 
            if (progress > 0.7) return Math.PI / 4; 
            let p = (progress - 0.4) / 0.3; 
            return -Math.PI + (p * (Math.PI * 1.25)); 
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > 0.4 && progress < 0.7) {
                ctx.fillStyle = "rgba(230, 126, 34, 0.7)";
                ${getExportShapeCode(os, ox, oy, false)}
            }
        }
    },
    'flurry': {
        getOffsets: (progress, dx, dy) => {
            let amt = Math.abs(Math.sin(progress * Math.PI * 3));
            return { x: dx * ${ls/2} * amt, y: dy * ${ls/2} * amt, hop: 0 };
        },
        getWeaponRotation: (progress) => {
            return Math.sin(progress * Math.PI * 6) * (Math.PI / 3);
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > 0.2 && progress < 0.8) {
                let angleOffset = Math.sin(progress * Math.PI * 6) * (Math.PI / 4);
                ctx.save();
                ctx.rotate(angleOffset);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
                ctx.lineWidth = 4;
                ${getExportShapeCode(os, ox, oy, true)}
                ctx.restore();
            }
        }
    },
    'thrust': {
        getOffsets: (progress, dx, dy) => {
            let amt = Math.sin(progress * Math.PI);
            return { x: dx * ${ls} * amt, y: dy * ${ls} * amt, hop: 0 };
        },
        getWeaponRotation: (progress) => {
            if (progress < 0.4) return -(progress / 0.4) * (Math.PI / 8); 
            if (progress > 0.7) return 0; 
            let p = (progress - 0.4) / 0.3; 
            return -Math.PI/8 + (p * Math.PI/8);
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > 0.4 && progress < 0.7) {
                ctx.fillStyle = "rgba(241, 196, 15, 0.9)";
                ${getExportShapeCode(os, ox, oy, false)}
            }
        }
    },
    'spin_cleave': {
        getOffsets: (progress, dx, dy) => {
            let amt = Math.sin(progress * Math.PI);
            return { x: dx * ${ls * 0.7} * amt, y: dy * ${ls * 0.7} * amt, hop: 0 };
        },
        getWeaponRotation: (progress) => {
            return progress * Math.PI * 4; 
        },
        drawOverlay: (ctx, progress, tileSize) => {
            if (progress > 0.3 && progress < 0.8) {
                ctx.strokeStyle = "rgba(231, 76, 60, 0.6)";
                ctx.lineWidth = 6;
                ${getExportShapeCode(os, ox, oy, true)}
            }
        }
    }
};`;
    
    const exportArea = document.getElementById('exportArea');
    exportArea.value = exportCode;
    exportArea.style.display = 'block';
    exportArea.select();
    document.execCommand('copy');
    exportArea.style.display = 'none';

    let originalText = exportBtn.innerText;
    exportBtn.innerText = "✅ COPIED TO CLIPBOARD!";
    exportBtn.classList.remove('bg-blue-600', 'hover:bg-blue-500');
    exportBtn.classList.add('bg-green-600', 'hover:bg-green-500');
    
    setTimeout(() => { 
        exportBtn.innerText = originalText; 
        exportBtn.classList.remove('bg-green-600', 'hover:bg-green-500');
        exportBtn.classList.add('bg-blue-600', 'hover:bg-blue-500');
    }, 2000);
});

// --- Core Render Loop ---
function animate(timestamp) {
    if (!isPlaying) return;

    if (!lastTime) lastTime = timestamp;
    const deltaTime = timestamp - lastTime;
    lastTime = timestamp;

    currentProgress += deltaTime / animationDuration;

    if (currentProgress >= 1.0) {
        currentProgress = 1.0;
        isPlaying = false;
    }

    timelineScrubber.value = currentProgress;
    drawScene();

    if (isPlaying) {
        animationFrameId = requestAnimationFrame(animate);
    }
}

function drawScene() {
    if (typeof drawProceduralSprite !== 'function') return;

    // 1. Draw Background Map
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (SpriteMatrices['ground_wilderness']) {
        for(let x = 0; x < canvas.width; x += TILE_SIZE) {
            for(let y = 0; y < canvas.height; y += TILE_SIZE) {
                drawProceduralSprite(ctx, SpriteMatrices['ground_wilderness'], x, y, TILE_SIZE);
            }
        }
    }
    
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
    ctx.lineWidth = 1;
    for(let x = 0; x < canvas.width; x += TILE_SIZE) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for(let y = 0; y < canvas.height; y += TILE_SIZE) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }

    progressText.innerText = currentProgress.toFixed(3);

    const selectedTarget = targetSelect.value || 'publing';
    let tSize = selectedTarget.includes('behemoth') || selectedTarget.includes('overlord') ? 2 : 1;

    let centerStartX = START_X + TILE_SIZE/2;
    let centerStartY = START_Y + TILE_SIZE/2;
    let centerTargetX = TARGET_X + (TILE_SIZE * tSize)/2;
    let centerTargetY = TARGET_Y + (TILE_SIZE * tSize)/2;

    let DX = centerTargetX - centerStartX;
    let DY = centerTargetY - centerStartY;

    const activeProfile = MeleeAnimProfiles[profileSelect.value];
    const offsets = activeProfile.getOffsets(currentProgress, DX, DY);

    const attackerX = START_X + offsets.x;
    const attackerY = START_Y + offsets.y - offsets.hop; 

    // 2. Draw Target Enemy
    if (SpriteMatrices[selectedTarget]) {
        drawProceduralSprite(ctx, SpriteMatrices[selectedTarget], TARGET_X, TARGET_Y, TILE_SIZE * tSize);
        
        if (isDraggingTarget || Math.abs(currentProgress) === 0) {
            ctx.strokeStyle = 'rgba(231, 76, 60, 0.8)';
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(TARGET_X, TARGET_Y, TILE_SIZE * tSize, TILE_SIZE * tSize);
            ctx.setLineDash([]);
        }
    }

    // 3. Draw Attacker Anatomy
    drawProceduralSprite(ctx, SpriteMatrices['body_male'], attackerX, attackerY, TILE_SIZE);
    drawProceduralSprite(ctx, SpriteMatrices['eyes_blue'], attackerX, attackerY, TILE_SIZE);
    drawProceduralSprite(ctx, SpriteMatrices['hair_messy'], attackerX, attackerY, TILE_SIZE);

    // 4. Draw Weapon with True Pivot Mechanics
    const selWeapon = weaponSelect.value || 'weap_rusty_mace';
    if (SpriteMatrices[selWeapon]) {
        ctx.save();
        
        let handAnchorX = attackerX + (TILE_SIZE * 0.58);
        let handAnchorY = attackerY + (TILE_SIZE * 0.5);

        ctx.translate(handAnchorX, handAnchorY);

        let baseAngle = Math.atan2(DY, DX); 
        let animAngle = activeProfile.getWeaponRotation ? activeProfile.getWeaponRotation(currentProgress) : 0;
        
        ctx.rotate(baseAngle + animAngle - (Math.PI / 4)); 

        let pX = parseInt(pivotXSlider.value);
        let pY = parseInt(pivotYSlider.value);
        let pivotOffsetX = (pX / 24) * TILE_SIZE;
        let pivotOffsetY = (pY / 24) * TILE_SIZE;

        ctx.translate(-pivotOffsetX, -pivotOffsetY);
        drawProceduralSprite(ctx, SpriteMatrices[selWeapon], 0, 0, TILE_SIZE);

        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.arc(pivotOffsetX, pivotOffsetY, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    // 5. Draw Visual Overlay (Arcs & Slashes mapped over TARGET center)
    let angle = Math.atan2(DY, DX);
    ctx.save();
    ctx.translate(centerTargetX, centerTargetY);
    ctx.rotate(angle);
    activeProfile.drawOverlay(ctx, currentProgress, TILE_SIZE);
    ctx.restore();
}

</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pub Knights - Matrix Pixel Studio</title>
    
    <script src="js/character-creator.js"></script>
    <script src="js/item-assets.js"></script>
    <script src="js/map-assets.js"></script>
    <script src="js/npc-assets.js"></script>

    <style>
        body {
            background-color: #2c2520;
            color: #f4ebd9;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #ffcc66;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        .container {
            display: flex;
            gap: 20px;
            background: rgba(34, 26, 20, 0.95);
            padding: 20px;
            border: 2px solid #634e3d;
            border-radius: 6px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
        }
        .canvas-container {
            position: relative;
        }
        #paint-canvas {
            background-color: #1a1512;
            border: 4px solid #8b5a2b;
            cursor: crosshair;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .controls {
            display: flex;
            flex-direction: column;
            width: 320px;
            gap: 15px;
        }
        button, textarea, select {
            background: #110d0a;
            color: #f1c40f;
            border: 2px solid #634e3d;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border-radius: 4px;
        }
        textarea:focus, select:focus {
            outline: none;
            border-color: #ffcc66;
        }
        button {
            background: #8b5a2b;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #a06d3b; }
        
        #export-btn { background: #27ae60; border-color: #2ecc71; font-size: 16px; }
        #export-btn:hover { background: #2ecc71; }
        #clear-btn { background: #c0392b; border-color: #e74c3c; }
        
        textarea {
            height: 120px;
            resize: none;
            white-space: pre;
            color: #bdc3c7;
        }

        /* === NEW: TOOLBAR STYLES === */
        .toolbar {
            display: flex;
            gap: 5px;
            background: #1a1512;
            padding: 10px;
            border: 1px solid #4a3b2c;
            border-radius: 4px;
        }
        .tool-btn {
            flex: 1;
            padding: 8px;
            background: #2c2520;
            border: 2px solid #4a3b2c;
            color: #bbaaa0;
            font-size: 16px;
        }
        .tool-btn.active {
            background: #27ae60;
            border-color: #2ecc71;
            color: #fff;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* === NEW: SWATCH GRID STYLES === */
        .palette-container {
            background: #110d0a;
            border: 2px solid #634e3d;
            border-radius: 4px;
            padding: 10px;
            max-height: 250px;
            overflow-y: auto;
        }
        .palette-section { margin-bottom: 10px; }
        .palette-header {
            color: #bbaaa0;
            font-size: 11px;
            font-weight: bold;
            border-bottom: 1px dashed #4a3b2c;
            margin-bottom: 8px;
            padding-bottom: 4px;
        }
        .swatch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(28px, 1fr));
            gap: 4px;
        }
        .swatch {
            width: 28px;
            height: 28px;
            border: 2px solid #110d0a;
            border-radius: 4px;
            cursor: pointer;
            box-sizing: border-box;
            transition: transform 0.1s;
        }
        .swatch:hover {
            transform: scale(1.1);
            border-color: #ffcc66;
            z-index: 10;
        }
        .swatch.active {
            border-color: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }

        .checkerboard {
            background-color: #1a1512;
            background-image: linear-gradient(45deg, #333 25%, transparent 25%, transparent 75%, #333 75%, #333), 
                              linear-gradient(45deg, #333 25%, transparent 25%, transparent 75%, #333 75%, #333);
            background-size: 10px 10px; background-position: 0 0, 5px 5px;
        }
        /* Mobile Scaling */
        @media (max-width: 800px) {
            body { padding: 10px; }
            .container { flex-direction: column; align-items: center; padding: 10px; }
            .controls { width: 100%; max-width: 480px; }
            #paint-canvas { width: 100%; max-width: 480px; height: auto; aspect-ratio: 1 / 1; }
        }
    </style>
</head>
<body>

    <h1>🍻 Matrix Pixel Studio</h1>

    <div class="container">
        <div class="canvas-container">
            <canvas id="paint-canvas" width="480" height="480"></canvas>
            
            <div style="margin-top: 15px; background: #1a1512; padding: 15px; border: 2px solid #4a3b2c; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);">
                <label style="color: #ffcc66; font-size: 11px; font-weight: bold; display: block; margin-bottom: 8px;">💉 INJECT EXISTING GAME SPRITE:</label>
                <div style="display: flex; gap: 10px;">
                    <select id="inject-select" style="flex: 1;">
                        <option value="">-- Select a Sprite to Load --</option>
                    </select>
                    <button onclick="injectSprite()" style="background: #8e44ad; border-color: #9b59b6;">Load to Matrix</button>
                </div>
                <div style="font-size: 10px; color: #bbaaa0; margin-top: 6px;">* Warning: This will overwrite your current canvas.</div>
            </div>
        </div>

        <div class="controls">
            
            <!-- NEW: TOOLBAR -->
            <div class="toolbar">
                <button class="tool-btn active" id="btn-brush" onclick="setTool('brush')" title="Paint Brush">🖊️</button>
                <button class="tool-btn" id="btn-fill" onclick="setTool('fill')" title="Bucket Fill">🪣</button>
                <button class="tool-btn" id="btn-eye" onclick="setTool('eyedropper')" title="Eyedropper">💧</button>
            </div>

            <!-- VISUAL SWATCH GRID -->
            <div>
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px;">
                    <label style="color: #bbaaa0; font-size: 11px; font-weight: bold;">COLOR PALETTE:</label>
                    <span id="active-color-name" style="color: #2ecc71; font-size: 10px; font-weight: bold;">[ . ] Eraser</span>
                </div>
                <div class="palette-container" id="palette-grid">
                    <!-- Swatches injected via JS -->
                </div>
            </div>

            <!-- OPTIONS -->
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label style="color: #bbaaa0; font-size: 11px; font-weight: bold;">GHOST MODEL:</label>
                    <select id="bg-model-select" style="width: 100%; margin-top: 5px; padding: 8px;">
                        <option value="none">Ghost (Off)</option>
                        <option value="body_male">Male Base</option>
                        <option value="body_female">Female Base</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label style="color: #bbaaa0; font-size: 11px; font-weight: bold;">BRUSH SIZE:</label>
                    <select id="brush-size-select" style="width: 100%; margin-top: 5px; padding: 8px;">
                        <option value="1">1x1 Pixel</option>
                        <option value="2">2x2 Block</option>
                        <option value="3">3x3 Block</option>
                    </select>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label style="color: #bbaaa0; font-size: 11px; font-weight: bold;">CANVAS BG:</label>
                    <select id="canvas-bg-select" style="width: 100%; margin-top: 5px; padding: 8px;">
                        <option value="brown">Brown Studio</option>
                        <option value="white">White</option>
                        <option value="black">Black</option>
                    </select>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button id="clear-btn" style="flex: 1;" onclick="clearCanvas()">🗑️ Wipe Matrix</button>
                <button style="flex: 1; background: #c0392b; border-color: #e74c3c;" onclick="window.parent.postMessage('RETURN_TO_TOWN', '*')">↩ Town</button>
            </div>
            
            <button id="export-btn" onclick="exportSprite()">💾 Export to Code</button>

            <div>
                <label style="color: #bbaaa0; font-size: 11px; font-weight: bold;">EXPORTED ENGINE ARRAY:</label>
                <textarea id="export-output" readonly placeholder="Your generated code will appear here..."></textarea>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paint-canvas');
        const ctx = canvas.getContext('2d');
        const exportOutput = document.getElementById('export-output');
        const bgSelect = document.getElementById('bg-model-select');
        const canvasBgSelect = document.getElementById('canvas-bg-select');
        const brushSelect = document.getElementById('brush-size-select');
        const activeColorName = document.getElementById('active-color-name');

        const GRID_SIZE = 24;
        const CELL_SIZE = canvas.width / GRID_SIZE;
        const CANVAS_BACKGROUNDS = {
            brown: '#1a1512',
            white: '#ffffff',
            black: '#000000'
        };
        
        let grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill('.'));
        let isDrawing = false;
        let activeChar = '.';
        let currentTool = 'brush'; // 'brush', 'fill', 'eyedropper'

        bgSelect.addEventListener('change', drawGrid);
        canvasBgSelect.addEventListener('change', setCanvasBackground);

        function setCanvasBackground() {
            canvas.style.backgroundColor = CANVAS_BACKGROUNDS[canvasBgSelect.value] || CANVAS_BACKGROUNDS.brown;
        }

        // --- NEW: TOOL MANAGEMENT ---
        function setTool(tool) {
            currentTool = tool;
            document.getElementById('btn-brush').classList.remove('active');
            document.getElementById('btn-fill').classList.remove('active');
            document.getElementById('btn-eye').classList.remove('active');

            if (tool === 'brush') document.getElementById('btn-brush').classList.add('active');
            if (tool === 'fill') document.getElementById('btn-fill').classList.add('active');
            if (tool === 'eyedropper') document.getElementById('btn-eye').classList.add('active');
            
            if (tool === 'eyedropper') canvas.style.cursor = 'crosshair';
            else if (tool === 'fill') canvas.style.cursor = 'cell';
            else canvas.style.cursor = 'crosshair';
        }

        // --- NEW: PALETTE GRID GENERATOR ---
        function initPalette() {
            if (typeof PALETTE === 'undefined') return alert("CRITICAL ERROR: PALETTE object not found!");

            const paletteGrid = document.getElementById('palette-grid');
            paletteGrid.innerHTML = ''; 

            const systemTools = ['.', '_'];
            const dynamicColors = {
                'S': 'Skin Tone', 'H': 'Hair Tone', 'Z': 'Eye Color',
                'U': 'Shirt Color', 'P': 'Pants Color', 'D': 'Boots Color'
            };

            const addSection = (title, chars) => {
                let section = document.createElement('div');
                section.className = 'palette-section';
                
                let header = document.createElement('div');
                header.className = 'palette-header';
                header.innerText = title;
                section.appendChild(header);

                let gridDiv = document.createElement('div');
                gridDiv.className = 'swatch-grid';

                chars.forEach(char => {
                    let hex = PALETTE[char];
                    let swatch = document.createElement('div');
                    swatch.className = 'swatch';
                    swatch.id = `swatch-${char}`;

                    let label = `[ ${char} ] `;
                    if (char === '.') label += "Eraser (Transparent)";
                    else if (char === '_') label += "Hair Clipping Mask";
                    else if (dynamicColors[char]) label += `Dynamic: ${dynamicColors[char]}`;
                    else label += hex;
                    
                    swatch.title = label; // Native HTML tooltip

                    if (char === '.') swatch.classList.add('checkerboard');
                    else if (char === '_') {
                        swatch.style.backgroundColor = 'rgba(231, 76, 60, 0.4)';
                        swatch.classList.add('checkerboard');
                    } else {
                        swatch.style.backgroundColor = hex;
                    }

                    if (char === activeChar) swatch.classList.add('active');

                    swatch.onclick = () => {
                        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                        swatch.classList.add('active');
                        activeChar = char;
                        activeColorName.innerText = label;
                        if (currentTool === 'eyedropper') setTool('brush'); // Auto-switch back to paint
                    };

                    gridDiv.appendChild(swatch);
                });
                
                section.appendChild(gridDiv);
                paletteGrid.appendChild(section);
            };

            // Gather character arrays for the grids
            let staticChars = Object.keys(PALETTE).filter(c => !systemTools.includes(c) && !dynamicColors[c]);
            
            addSection('🛠️ SYSTEM TOOLS', systemTools);
            addSection('🎭 DYNAMIC VARIABLES', Object.keys(dynamicColors).filter(c => PALETTE[c]));
            addSection('🎨 STATIC COLORS', staticChars);
        }

        // --- GRID RENDERING ---
        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Ghost
            const bgModel = bgSelect.value;
            if (bgModel !== 'none' && typeof SpriteMatrices !== 'undefined' && SpriteMatrices[bgModel]) {
                ctx.globalAlpha = 0.35; 
                const drawGhostLayer = (matrixKey) => {
                    let matrix = SpriteMatrices[matrixKey];
                    if (!matrix) return;
                    for (let y = 0; y < GRID_SIZE; y++) {
                        if (!matrix[y]) continue;
                        for (let x = 0; x < GRID_SIZE; x++) {
                            let char = matrix[y][x];
                            if (char && char !== '.') {
                                let color = PALETTE[char] || '#ff00ff';
                                if (char === 'S') color = '#f1c27d'; 
                                if (char === 'P') color = '#2c3e50'; 
                                if (char === 'U') color = '#2980b9'; 
                                if (char === 'D') color = '#3e2723'; 
                                if (char === 'Z') color = '#ffffff'; 
                                
                                ctx.fillStyle = color;
                                ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                            }
                        }
                    }
                };
                drawGhostLayer(bgModel);
                if (bgModel === 'body_male' || bgModel === 'body_female') drawGhostLayer('eyes_blue');
                ctx.globalAlpha = 1.0; 
            }

            // 2. Draw Pixels
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    let char = grid[y][x];
                    
                    if (char === '.') {
                        ctx.strokeStyle = '#2a221f';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                    } else if (char === '_') {
                        ctx.fillStyle = 'rgba(231, 76, 60, 0.4)';
                        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                        ctx.strokeStyle = '#e74c3c';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(x * CELL_SIZE, y * CELL_SIZE);
                        ctx.lineTo((x + 1) * CELL_SIZE, (y + 1) * CELL_SIZE);
                        ctx.stroke();
                    } else {
                        ctx.fillStyle = PALETTE[char] || '#ff00ff'; 
                        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                    }
                }
            }
        }

        // --- NEW: FLOOD FILL ALGORITHM (THE BUCKET) ---
        function floodFill(startX, startY, targetChar) {
            let targetColor = grid[startY][startX];
            if (targetColor === targetChar) return; // Don't fill with the same color

            let queue = [{x: startX, y: startY}];
            while(queue.length > 0) {
                let {x, y} = queue.shift();
                
                if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) continue;
                if (grid[y][x] !== targetColor) continue;

                grid[y][x] = targetChar;
                
                // Add adjacent pixels
                queue.push({x: x + 1, y: y});
                queue.push({x: x - 1, y: y});
                queue.push({x: x, y: y + 1});
                queue.push({x: x, y: y - 1});
            }
            drawGrid();
        }

        // --- INTERACTION LOGIC ---
        function handleCanvasAction(event, isClick) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = Math.floor(((event.clientX - rect.left) * scaleX) / CELL_SIZE);
            const y = Math.floor(((event.clientY - rect.top) * scaleY) / CELL_SIZE);

            if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) return;

            // EYEDROPPER
            if (currentTool === 'eyedropper' && isClick) {
                let pickedChar = grid[y][x];
                let swatch = document.getElementById(`swatch-${pickedChar}`);
                if (swatch) swatch.click(); // Triggers the visual update & auto-reverts to brush
                return;
            }

            // BUCKET FILL
            if (currentTool === 'fill' && isClick) {
                floodFill(x, y, activeChar);
                return;
            }

            // BRUSH (Supports Click + Drag)
            if (currentTool === 'brush' && (isDrawing || isClick)) {
                const size = parseInt(brushSelect.value);
                const offset = size === 3 ? 1 : 0;

                for (let sy = 0; sy < size; sy++) {
                    for (let sx = 0; sx < size; sx++) {
                        let px = x + sx - offset;
                        let py = y + sy - offset;
                        if (px >= 0 && px < GRID_SIZE && py >= 0 && py < GRID_SIZE) {
                            grid[py][px] = activeChar;
                        }
                    }
                }
                drawGrid();
            }
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; handleCanvasAction(e, true); });
        canvas.addEventListener('mousemove', (e) => { if (isDrawing) handleCanvasAction(e, false); });
        window.addEventListener('mouseup', () => isDrawing = false);

        function clearCanvas() {
            if(confirm("Are you sure you want to wipe the matrix?")) {
                grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill('.'));
                drawGrid();
                exportOutput.value = "";
            }
        }
        
        function populateInjector() {
            const injectSelect = document.getElementById('inject-select');
            if (typeof SpriteMatrices === 'undefined') return;
            const keys = Object.keys(SpriteMatrices).sort();
            keys.forEach(key => {
                let opt = document.createElement('option');
                opt.value = key;
                opt.innerText = key;
                injectSelect.appendChild(opt);
            });
        }

        function injectSprite() {
            const spriteKey = document.getElementById('inject-select').value;
            if (!spriteKey || typeof SpriteMatrices === 'undefined' || !SpriteMatrices[spriteKey]) return alert("Please select a valid sprite.");
            if (confirm(`Overwrite canvas with '${spriteKey}'?`)) {
                const matrix = SpriteMatrices[spriteKey];
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        grid[y][x] = (matrix[y] && matrix[y][x]) ? matrix[y][x] : '.';
                    }
                }
                drawGrid();
                exportOutput.value = ""; 
            }
        }

        function exportSprite() {
            let output = "buildSprite([\n";
            for (let y = 0; y < GRID_SIZE; y++) {
                output += `    "${grid[y].join('')}"${y < GRID_SIZE - 1 ? ',' : ''}\n`;
            }
            output += "])";
            
            exportOutput.value = output;
            exportOutput.select();
            document.execCommand('copy');
            
            let btn = document.getElementById('export-btn');
            let originalText = btn.innerText;
            btn.innerText = "📋 Copied to Clipboard!";
            setTimeout(() => btn.innerText = originalText, 1500);
        }

        window.onload = () => {
            setCanvasBackground();
            initPalette();
            populateInjector();
            drawGrid();
        };
    </script>
</body>
</html>

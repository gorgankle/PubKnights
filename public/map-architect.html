<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pub Knights - Map Architect</title>
    <style>
        :root {
            --bg: #1c1714;
            --panel: #241d18;
            --panel-2: #14110f;
            --line: #5d4938;
            --gold: #f1c766;
            --text: #f4ebd9;
            --muted: #b9aa98;
            --red: #d95757;
            --blue: #4f9ddd;
            --green: #4fb477;
            --stone: #87919a;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "Courier New", monospace;
            margin: 0;
            padding: 18px;
        }

        h1 {
            color: var(--gold);
            font-size: 28px;
            margin: 0 auto 14px;
            max-width: 1360px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.55);
        }

        label {
            color: var(--muted);
            display: grid;
            gap: 5px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        input,
        select,
        textarea {
            background: #0d0b09;
            border: 1px solid #46382d;
            border-radius: 4px;
            color: var(--text);
            font-family: inherit;
            min-height: 34px;
            padding: 7px 8px;
            width: 100%;
        }

        textarea {
            color: #58d68d;
            height: 230px;
            line-height: 1.35;
            resize: vertical;
        }

        button {
            background: #2d251f;
            border: 2px solid #4b3b30;
            border-radius: 4px;
            color: var(--text);
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            min-height: 38px;
            padding: 8px 10px;
        }

        button:hover { border-color: var(--gold); }

        .app-shell {
            align-items: flex-start;
            display: grid;
            gap: 16px;
            grid-template-columns: 280px minmax(680px, 960px);
            margin: 0 auto;
            max-width: 1360px;
        }

        .panel {
            background: var(--panel);
            border: 2px solid var(--line);
            border-radius: 6px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.45);
            padding: 14px;
        }

        .tools-panel {
            display: grid;
            gap: 12px;
        }

        .tool-section {
            border-top: 1px dashed #634e3d;
            display: grid;
            gap: 9px;
            padding-top: 12px;
        }

        .tool-section:first-child {
            border-top: 0;
            padding-top: 0;
        }

        .tool-title {
            color: var(--gold);
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .brush-grid {
            display: grid;
            gap: 7px;
        }

        .btn-tool {
            color: var(--muted);
            text-align: left;
        }

        .btn-tool.active {
            background: #825c2f;
            border-color: var(--gold);
            color: #fff;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.42);
        }

        .btn-danger {
            background: #77312c;
            border-color: #b84a43;
            color: #fff;
            width: 100%;
        }

        .canvas-wrapper {
            background: #0f0c0a;
            border: 4px solid #8b5a2b;
            border-radius: 6px;
            cursor: crosshair;
            overflow: auto;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        .export-panel {
            display: grid;
            gap: 8px;
            grid-column: 1 / -1;
        }

        .export-bar {
            align-items: center;
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }

        .copy-btn {
            background: #236743;
            border-color: var(--green);
            color: #fff;
            min-width: 160px;
        }

        .hint {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
        }

        @media (max-width: 980px) {
            body { padding: 12px; }
            .app-shell { grid-template-columns: 1fr; }
            .canvas-wrapper { width: 100%; }
        }
    </style>
</head>
<body>
    <h1>Map Architect</h1>

    <main class="app-shell">
        <aside class="panel tools-panel">
            <section class="tool-section">
                <div class="tool-title">Template</div>
                <label>
                    Map ID
                    <input id="map-id" value="CUSTOM_COMBAT_MAP" spellcheck="false">
                </label>
                <label>
                    Display Name
                    <input id="map-name" value="Custom Combat Map" spellcheck="false">
                </label>
                <label>
                    Zone
                    <select id="map-zone">
                        <option value="WILDERNESS">Wilderness</option>
                        <option value="CELLARS">Cellars</option>
                        <option value="ABYSS">Abyss</option>
                        <option value="GORILLA_ARENA">Gorilla Arena</option>
                    </select>
                </label>
                <label>
                    Floor Sprite
                    <select id="floor-sprite">
                        <option value="ground_wilderness">ground_wilderness</option>
                        <option value="ground_cellars">ground_cellars</option>
                        <option value="ground_abyss">ground_abyss</option>
                        <option value="ground_arena">ground_arena</option>
                    </select>
                </label>
            </section>

            <section class="tool-section">
                <div class="tool-title">Brushes</div>
                <div class="brush-grid">
                    <button class="btn-tool" id="tool-FLOOR" onclick="setTool('FLOOR')">Floor Tile</button>
                    <button class="btn-tool active" id="tool-OBSTACLE" onclick="setTool('OBSTACLE')">Obstacle</button>
                    <button class="btn-tool" id="tool-ENEMY" onclick="setTool('ENEMY')">Enemy</button>
                    <button class="btn-tool" id="tool-INTERACTABLE" onclick="setTool('INTERACTABLE')">Interactable</button>
                    <button class="btn-tool" id="tool-PLAYER" onclick="setTool('PLAYER')">Player Start</button>
                    <button class="btn-tool" id="tool-ERASE" onclick="setTool('ERASE')">Erase</button>
                </div>
            </section>

            <section class="tool-section">
                <div class="tool-title">Brush Data</div>
                <label>
                    Enemy ID
                    <select id="enemy-id">
                        <option value="goblin_axeling">goblin_axeling</option>
                        <option value="peanut_slinger">peanut_slinger</option>
                        <option value="magic_banana">magic_banana</option>
                        <option value="wild_ravager">wild_ravager</option>
                        <option value="publing">publing</option>
                        <option value="alpha_poacher">alpha_poacher</option>
                        <option value="wilderness_overlord">wilderness_overlord</option>
                        <option value="corrupted_cask">corrupted_cask</option>
                        <option value="pub_crawl_mimic">pub_crawl_mimic</option>
                        <option value="vintage_behemoth">vintage_behemoth</option>
                        <option value="enraged_gorilla">enraged_gorilla</option>
                        <option value="spectral_barfly">spectral_barfly</option>
                        <option value="mash_crawler">mash_crawler</option>
                        <option value="eldritch_keg">eldritch_keg</option>
                    </select>
                </label>
                <label>
                    Obstacle Sprite
                    <select id="obstacle-sprite">
                        <option value="map_tree">map_tree</option>
                        <option value="map_broken_cask">map_broken_cask</option>
                        <option value="map_pillar">map_pillar</option>
                        <option value="map_boulder">map_boulder</option>
                    </select>
                </label>
            </section>

            <section class="tool-section">
                <button class="btn-danger" onclick="clearMap()">Clear Map</button>
            </section>
        </aside>

        <section class="canvas-wrapper">
            <canvas id="mapCanvas" width="960" height="600"></canvas>
        </section>

        <section class="panel export-panel">
            <div class="export-bar">
                <strong style="color: var(--gold);">Combat Template Export</strong>
                <button id="export-btn" class="copy-btn" onclick="copyExport()">Copy Template</button>
            </div>
            <textarea id="export-output" readonly></textarea>
            <div class="hint">Paste this block inside the CombatMapTemplates object in combatMapTemplates.js, then point getTemplateForEncounter at the new ID when it should be used.</div>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');

        const COLS = 16;
        const ROWS = 10;
        const TILE_SIZE = 60;
        const SERVER_TILE_SIZE = 54;

        const colorByTool = {
            FLOOR: '#5d7f62',
            OBSTACLE: '#87919a',
            ENEMY: '#d95757',
            INTERACTABLE: '#f1c766',
            PLAYER: '#4f9ddd'
        };

        const labelByTool = {
            FLOOR: 'FLR',
            OBSTACLE: 'OBS',
            ENEMY: 'MOB',
            INTERACTABLE: 'ACT',
            PLAYER: 'YOU'
        };

        let currentTool = 'OBSTACLE';
        let isDrawing = false;
        let mapGrid = createEmptyGrid();
        let floorGrid = createEmptyGrid();

        function createEmptyGrid() {
            return Array.from({ length: COLS }, () => Array.from({ length: ROWS }, () => null));
        }

        function setTool(toolName) {
            currentTool = toolName;
            document.querySelectorAll('.btn-tool').forEach(button => button.classList.remove('active'));
            document.getElementById('tool-' + toolName).classList.add('active');
        }

        function clearMap() {
            if (!confirm('Clear the current map?')) return;
            mapGrid = createEmptyGrid();
            floorGrid = createEmptyGrid();
            renderMap();
            generateExport();
        }

        canvas.addEventListener('mousedown', event => {
            isDrawing = true;
            applyTool(event);
        });

        canvas.addEventListener('mousemove', event => {
            if (isDrawing) applyTool(event);
        });

        window.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        canvas.addEventListener('contextmenu', event => event.preventDefault());

        document.getElementById('map-zone').addEventListener('change', syncFloorSpriteToZone);

        document.querySelectorAll('input, select').forEach(field => {
            field.addEventListener('input', generateExport);
            field.addEventListener('change', generateExport);
        });

        function syncFloorSpriteToZone() {
            const floorByZone = {
                WILDERNESS: 'ground_wilderness',
                CELLARS: 'ground_cellars',
                ABYSS: 'ground_abyss',
                GORILLA_ARENA: 'ground_arena'
            };
            const floorSelect = document.getElementById('floor-sprite');
            floorSelect.value = floorByZone[document.getElementById('map-zone').value] || 'ground_wilderness';
        }

        function applyTool(event) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((event.clientX - rect.left) / TILE_SIZE);
            const y = Math.floor((event.clientY - rect.top) / TILE_SIZE);
            if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return;

            const activeTool = event.buttons === 2 ? 'ERASE' : currentTool;

            if (activeTool === 'ERASE') {
                mapGrid[x][y] = null;
                floorGrid[x][y] = null;
            } else if (activeTool === 'FLOOR') {
                floorGrid[x][y] = { type: 'FLOOR', spriteId: document.getElementById('floor-sprite').value };
            } else if (activeTool === 'PLAYER') {
                clearExistingPlayerStart();
                mapGrid[x][y] = { type: 'PLAYER' };
            } else if (activeTool === 'ENEMY') {
                mapGrid[x][y] = { type: 'ENEMY', id: document.getElementById('enemy-id').value };
            } else if (activeTool === 'OBSTACLE') {
                mapGrid[x][y] = { type: 'OBSTACLE', spriteId: document.getElementById('obstacle-sprite').value };
            } else if (activeTool === 'INTERACTABLE') {
                mapGrid[x][y] = { type: 'INTERACTABLE', id: 'chest', used: false };
            }

            renderMap();
            generateExport();
        }

        function clearExistingPlayerStart() {
            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    if (mapGrid[x][y]?.type === 'PLAYER') mapGrid[x][y] = null;
                }
            }
        }

        function renderMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#15110e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    ctx.strokeStyle = '#3a2f26';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);

                    const floorCell = floorGrid[x][y];
                    if (floorCell) drawFloorCell(x, y, floorCell);

                    const cell = mapGrid[x][y];
                    if (cell) drawCell(x, y, cell);
                }
            }
        }

        function drawFloorCell(x, y, cell) {
            const px = x * TILE_SIZE;
            const py = y * TILE_SIZE;

            ctx.fillStyle = hexToRgba(colorByTool.FLOOR, 0.28);
            ctx.fillRect(px + 1, py + 1, TILE_SIZE - 2, TILE_SIZE - 2);

            ctx.fillStyle = colorByTool.FLOOR;
            ctx.font = '700 10px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(shorten(cell.spriteId), px + TILE_SIZE / 2, py + TILE_SIZE - 10);
        }

        function drawCell(x, y, cell) {
            const px = x * TILE_SIZE;
            const py = y * TILE_SIZE;
            const type = cell.type;

            ctx.fillStyle = hexToRgba(colorByTool[type], 0.34);
            ctx.fillRect(px + 3, py + 3, TILE_SIZE - 6, TILE_SIZE - 6);

            ctx.strokeStyle = colorByTool[type];
            ctx.lineWidth = 2;
            ctx.strokeRect(px + 6, py + 6, TILE_SIZE - 12, TILE_SIZE - 12);

            ctx.fillStyle = colorByTool[type];
            ctx.font = '700 15px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(labelByTool[type], px + TILE_SIZE / 2, py + 26);

            ctx.fillStyle = '#f4ebd9';
            ctx.font = '10px monospace';
            const subLabel = cell.id || cell.spriteId || '';
            ctx.fillText(shorten(subLabel), px + TILE_SIZE / 2, py + 43);
        }

        function hexToRgba(hex, alpha) {
            const value = parseInt(hex.slice(1), 16);
            const r = (value >> 16) & 255;
            const g = (value >> 8) & 255;
            const b = value & 255;
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function shorten(value) {
            if (!value) return '';
            return value.length > 12 ? value.slice(0, 11) + '.' : value;
        }

        function cleanMapId(value) {
            return (value || 'CUSTOM_COMBAT_MAP')
                .trim()
                .toUpperCase()
                .replace(/[^A-Z0-9_]/g, '_')
                .replace(/_+/g, '_')
                .replace(/^_|_$/g, '') || 'CUSTOM_COMBAT_MAP';
        }

        function collectMapData() {
            const mapId = cleanMapId(document.getElementById('map-id').value);
            const mapName = document.getElementById('map-name').value.trim() || 'Custom Combat Map';
            const zone = document.getElementById('map-zone').value;
            const floorSpriteId = document.getElementById('floor-sprite').value;
            const exportData = {
                id: mapId,
                zone,
                name: mapName,
                gridSize: { cols: COLS, rows: ROWS },
                tileSize: SERVER_TILE_SIZE,
                floorSpriteId,
                floorTiles: [],
                playerStart: { x: 1, y: 4 },
                enemies: [],
                obstacles: [],
                interactables: []
            };

            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    const floorCell = floorGrid[x][y];
                    if (floorCell && floorCell.spriteId !== floorSpriteId) {
                        exportData.floorTiles.push({ x, y, spriteId: floorCell.spriteId });
                    }

                    const cell = mapGrid[x][y];
                    if (!cell) continue;
                    if (cell.type === 'PLAYER') exportData.playerStart = { x, y };
                    if (cell.type === 'ENEMY') exportData.enemies.push({ id: cell.id, x, y });
                    if (cell.type === 'OBSTACLE') exportData.obstacles.push({ x, y, spriteId: cell.spriteId });
                    if (cell.type === 'INTERACTABLE') exportData.interactables.push({ x, y, type: cell.id, used: false });
                }
            }

            return exportData;
        }

        function generateExport() {
            const data = collectMapData();
            const mapId = data.id;
            const body = JSON.stringify(data, null, 4)
                .replace(/"([^"]+)":/g, '$1:')
                .replace(/"/g, '"');
            document.getElementById('export-output').value = `${mapId}: ${body}`;
        }

        function copyExport() {
            const outArea = document.getElementById('export-output');
            outArea.select();
            document.execCommand('copy');

            const btn = document.getElementById('export-btn');
            const oldText = btn.innerText;
            btn.innerText = 'Copied';
            setTimeout(() => btn.innerText = oldText, 1500);
        }

        renderMap();
        generateExport();
    </script>
</body>
</html>

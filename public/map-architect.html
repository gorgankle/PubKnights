<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pub Knights - Map Architect</title>
    <style>
        body {
            background-color: #2c2520; color: #f4ebd9; font-family: 'Courier New', monospace;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        h1 { color: #ffcc66; text-shadow: 0 2px 4px rgba(0,0,0,0.5); margin-bottom: 10px; }
        
        .container {
            display: flex; gap: 20px; background: rgba(34, 26, 20, 0.95); padding: 20px;
            border: 2px solid #634e3d; border-radius: 6px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
            width: 100%; max-width: 1300px; box-sizing: border-box; align-items: flex-start;
        }

        .tools-panel {
            width: 250px; background: #1a1512; padding: 15px; border-radius: 4px; border: 1px solid #4a3b2c;
            display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
        }

        .btn-tool {
            background: #2c2520; color: #bbaaa0; border: 2px solid #4a3b2c; padding: 10px;
            cursor: pointer; font-family: monospace; font-weight: bold; border-radius: 4px; text-align: left;
            transition: 0.1s;
        }
        .btn-tool:hover { background: #3e3126; border-color: #ffcc66; }
        .btn-tool.active { background: #8b5a2b; color: #fff; border-color: #f1c40f; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }

        .canvas-wrapper {
            background: #110d0a; border: 4px solid #8b5a2b; border-radius: 4px;
            position: relative; cursor: crosshair;
        }

        canvas { display: block; image-rendering: pixelated; }

        .export-panel {
            margin-top: 20px; width: 100%; max-width: 1300px; background: #1a1512;
            padding: 15px; border-radius: 4px; border: 1px solid #4a3b2c; box-sizing: border-box;
        }
        
        textarea {
            width: 100%; height: 150px; background: #0a0806; color: #2ecc71;
            border: 1px solid #3a2f26; padding: 10px; font-family: monospace; box-sizing: border-box;
        }

        .instructions { font-size: 11px; color: #bdc3c7; line-height: 1.4; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>🗺️ Level Architect</h1>

    <div class="container">
        
        <div class="tools-panel">
            <h3 style="color: #f1c40f; margin-top: 0; border-bottom: 1px dashed #634e3d; padding-bottom: 5px;">Brushes</h3>
            
            <button class="btn-tool active" onclick="setTool('OBSTACLE')" id="tool-OBSTACLE" style="border-left: 5px solid #7f8c8d;">🧱 Obstacle (Wall/Rock)</button>
            <button class="btn-tool" onclick="setTool('ENEMY')" id="tool-ENEMY" style="border-left: 5px solid #e74c3c;">👹 Enemy Spawn</button>
            <button class="btn-tool" onclick="setTool('INTERACTABLE')" id="tool-INTERACTABLE" style="border-left: 5px solid #f1c40f;">🧰 Interactable (Chest)</button>
            <button class="btn-tool" onclick="setTool('PLAYER')" id="tool-PLAYER" style="border-left: 5px solid #3498db;">🛡️ Player Start (Max 1)</button>
            <button class="btn-tool" onclick="setTool('ERASE')" id="tool-ERASE" style="border-left: 5px solid #bdc3c7; margin-top: 10px;">⬛ Eraser (Or Right-Click)</button>

            <button onclick="clearMap()" style="background: #c0392b; color: #fff; border: 2px solid #e74c3c; padding: 10px; margin-top: 20px; font-family: monospace; cursor: pointer;">🗑️ Clear Map</button>
        </div>

        <div class="canvas-wrapper">
            <canvas id="mapCanvas" width="960" height="600"></canvas>
        </div>
    </div>

    <div class="export-panel">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px;">
            <span style="color: #f1c40f; font-weight: bold;">Server Export JSON:</span>
            <button id="export-btn" onclick="copyJSON()" style="background: #27ae60; color: #fff; border: 2px solid #2ecc71; padding: 5px 15px; cursor: pointer; font-weight: bold; font-family: monospace;">📋 Copy to Clipboard</button>
        </div>
        <textarea id="export-output" readonly></textarea>
        <div class="instructions">Paste this block into <b>combat-maps.js</b> or send it via <b>combatRouter.js</b> when generating a zone.</div>
    </div>

    <script>
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        
        const COLS = 16;
        const ROWS = 10;
        const TILE_SIZE = 60;
        
        let currentTool = 'OBSTACLE';
        let isDrawing = false;
        
        // 2D Array to hold map data (null means floor)
        let mapGrid = Array(COLS).fill().map(() => Array(ROWS).fill(null));

        function setTool(toolName) {
            currentTool = toolName;
            document.querySelectorAll('.btn-tool').forEach(b => b.classList.remove('active'));
            document.getElementById('tool-' + toolName).classList.add('active');
        }

        function clearMap() {
            if(!confirm("Are you sure you want to wipe the current map?")) return;
            mapGrid = Array(COLS).fill().map(() => Array(ROWS).fill(null));
            renderMap();
            generateJSON();
        }

        // --- MOUSE LOGIC ---
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            applyTool(e);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDrawing) applyTool(e);
        });

        window.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        // Prevent context menu so right-click can erase
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        function applyTool(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / TILE_SIZE);
            const y = Math.floor((e.clientY - rect.top) / TILE_SIZE);

            if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return;

            // Right click always erases
            let activeTool = e.buttons === 2 ? 'ERASE' : currentTool;

            if (activeTool === 'ERASE') {
                mapGrid[x][y] = null;
            } else if (activeTool === 'PLAYER') {
                // Enforce Rule: Only one player start allowed
                for (let c = 0; c < COLS; c++) {
                    for (let r = 0; r < ROWS; r++) {
                        if (mapGrid[c][r] === 'PLAYER') mapGrid[c][r] = null;
                    }
                }
                mapGrid[x][y] = 'PLAYER';
            } else {
                mapGrid[x][y] = activeTool;
            }

            renderMap();
            generateJSON();
        }

        // --- RENDER ENGINE ---
        function renderMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Grid Lines & Floor
            ctx.strokeStyle = '#3a2f26';
            ctx.lineWidth = 1;
            for (let c = 0; c < COLS; c++) {
                for (let r = 0; r < ROWS; r++) {
                    ctx.strokeRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    
                    let cell = mapGrid[c][r];
                    if (cell) {
                        drawEntity(c, r, cell);
                    }
                }
            }
        }

        function drawEntity(x, y, type) {
            let px = x * TILE_SIZE;
            let py = y * TILE_SIZE;
            
            // Draw standard colored placeholders
            if (type === 'OBSTACLE') {
                ctx.fillStyle = '#7f8c8d';
                ctx.fillRect(px + 2, py + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                ctx.fillStyle = '#fff'; ctx.font = "10px monospace"; ctx.fillText("WALL", px + 15, py + 35);
            } else if (type === 'ENEMY') {
                ctx.fillStyle = 'rgba(231, 76, 60, 0.5)';
                ctx.fillRect(px + 2, py + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                ctx.fillStyle = '#e74c3c'; ctx.font = "24px sans-serif"; ctx.fillText("👹", px + 15, py + 40);
            } else if (type === 'INTERACTABLE') {
                ctx.fillStyle = 'rgba(241, 196, 15, 0.3)';
                ctx.fillRect(px + 2, py + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                ctx.fillStyle = '#f1c40f'; ctx.font = "24px sans-serif"; ctx.fillText("🧰", px + 15, py + 40);
            } else if (type === 'PLAYER') {
                ctx.fillStyle = 'rgba(52, 152, 219, 0.5)';
                ctx.fillRect(px + 2, py + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                ctx.fillStyle = '#3498db'; ctx.font = "24px sans-serif"; ctx.fillText("🛡️", px + 15, py + 40);
            }
        }

        // --- JSON COMPILER ---
        function generateJSON() {
            let exportData = {
                gridSize: { cols: COLS, rows: ROWS },
                playerStart: null,
                enemies: [],
                obstacles: [],
                interactables: []
            };

            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    let cell = mapGrid[x][y];
                    if (cell === 'PLAYER') exportData.playerStart = { x, y };
                    if (cell === 'ENEMY') exportData.enemies.push({ x, y });
                    if (cell === 'OBSTACLE') exportData.obstacles.push({ x, y });
                    if (cell === 'INTERACTABLE') exportData.interactables.push({ x, y, type: 'chest', used: false });
                }
            }

            document.getElementById('export-output').value = JSON.stringify(exportData, null, 4);
        }

        function copyJSON() {
            const outArea = document.getElementById('export-output');
            outArea.select();
            document.execCommand('copy');
            
            let btn = document.getElementById('export-btn');
            let oldText = btn.innerText;
            btn.innerText = "📋 COPIED!";
            setTimeout(() => btn.innerText = oldText, 1500);
        }

        // Initial render
        renderMap();
        generateJSON();
    </script>
</body>
</html>
